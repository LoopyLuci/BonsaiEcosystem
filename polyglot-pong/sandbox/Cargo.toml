[package]
name = "polyglot-pong-sandbox"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "polyglot-pong-sandbox"
path = "src/main.rs"

[dependencies]
polyglot-pong-common = { path = "../common" }
# bonsai-ai-fallback = { version = "0.2" } # Will be available in production
clap = { version = "4", features = ["derive"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1"
async-trait = "0.1"

[dev-dependencies]
futures = "0.3"
