[package]
name = "polyglot-pong-dashboard"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "polyglot-pong-dashboard"
path = "src/main.rs"

[dependencies]
axum = "0.7"
tokio = { version = "1", features = ["full"] }
futures = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
chrono = "0.4"

[dev-dependencies]
tokio-test = "0.4"
