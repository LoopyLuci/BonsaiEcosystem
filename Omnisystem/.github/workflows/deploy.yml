name: Build & Deploy - PATHFINDER Production

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: pathfinder

jobs:
  # Test & Build
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [user, content, teacher, parent, notification, achievement, insights]
    steps:
      - uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run tests for ${{ matrix.service }}
        run: |
          cd services/${{ matrix.service }}
          go test -v -coverprofile=coverage.out ./...
          go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./services/${{ matrix.service }}/coverage.out
          flags: ${{ matrix.service }}

  # Frontend Tests
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:ci

      - name: Run build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v3
        with:
          name: frontend-build
          path: dist/

  # Security Scan
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  # Code Quality
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v3

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # Docker Build
  docker:
    name: Docker Build & Push
    needs: [test, frontend-test, security, quality]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [user, content, teacher, parent, notification, achievement, insights]
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:buildcache,mode=max

  # Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    needs: [docker]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v3

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.27.0'

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig.yaml
          export KUBECONFIG=kubeconfig.yaml

      - name: Deploy to staging cluster
        run: |
          kubectl set image deployment/user-service user-service=${{ env.REGISTRY }}/${{ github.repository }}/user-service:${{ github.sha }} -n pathfinder-staging
          kubectl set image deployment/content-service content-service=${{ env.REGISTRY }}/${{ github.repository }}/content-service:${{ github.sha }} -n pathfinder-staging
          kubectl set image deployment/teacher-service teacher-service=${{ env.REGISTRY }}/${{ github.repository }}/teacher-service:${{ github.sha }} -n pathfinder-staging
          kubectl set image deployment/parent-service parent-service=${{ env.REGISTRY }}/${{ github.repository }}/parent-service:${{ github.sha }} -n pathfinder-staging
          kubectl set image deployment/notification-service notification-service=${{ env.REGISTRY }}/${{ github.repository }}/notification-service:${{ github.sha }} -n pathfinder-staging
          kubectl set image deployment/achievement-service achievement-service=${{ env.REGISTRY }}/${{ github.repository }}/achievement-service:${{ github.sha }} -n pathfinder-staging
          kubectl set image deployment/insights-service insights-service=${{ env.REGISTRY }}/${{ github.repository }}/insights-service:${{ github.sha }} -n pathfinder-staging
          kubectl rollout status deployment -n pathfinder-staging

      - name: Run smoke tests
        run: |
          ./scripts/smoke_tests.sh staging

  # Performance Tests
  performance:
    name: Performance Tests
    needs: [deploy-staging]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up k6
        run: |
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Run load tests
        run: |
          k6 run tests/performance/load_test.js \
            --vus 100 \
            --duration 60s \
            --out json=results.json

      - name: Upload performance results
        uses: actions/upload-artifact@v3
        with:
          name: performance-results
          path: results.json

  # Deploy to Production (Manual Approval)
  deploy-prod:
    name: Deploy to Production
    needs: [performance]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v3

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.27.0'

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig.yaml
          export KUBECONFIG=kubeconfig.yaml

      - name: Deploy to production cluster
        run: |
          kubectl set image deployment/user-service user-service=${{ env.REGISTRY }}/${{ github.repository }}/user-service:${{ github.sha }} -n pathfinder-prod
          kubectl set image deployment/content-service content-service=${{ env.REGISTRY }}/${{ github.repository }}/content-service:${{ github.sha }} -n pathfinder-prod
          kubectl set image deployment/teacher-service teacher-service=${{ env.REGISTRY }}/${{ github.repository }}/teacher-service:${{ github.sha }} -n pathfinder-prod
          kubectl set image deployment/parent-service parent-service=${{ env.REGISTRY }}/${{ github.repository }}/parent-service:${{ github.sha }} -n pathfinder-prod
          kubectl set image deployment/notification-service notification-service=${{ env.REGISTRY }}/${{ github.repository }}/notification-service:${{ github.sha }} -n pathfinder-prod
          kubectl set image deployment/achievement-service achievement-service=${{ env.REGISTRY }}/${{ github.repository }}/achievement-service:${{ github.sha }} -n pathfinder-prod
          kubectl set image deployment/insights-service insights-service=${{ env.REGISTRY }}/${{ github.repository }}/insights-service:${{ github.sha }} -n pathfinder-prod
          kubectl rollout status deployment -n pathfinder-prod

      - name: Verify production deployment
        run: ./scripts/verify_deployment.sh prod

      - name: Create deployment notification
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Successfully deployed to production! 🚀\n\nVersion: ${{ github.sha }}\nTime: ${{ github.event.head_commit.timestamp }}'
            })

  # Rollback (Manual)
  rollback:
    name: Rollback Production
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - uses: actions/checkout@v3

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.27.0'

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig.yaml
          export KUBECONFIG=kubeconfig.yaml

      - name: Rollback to previous version
        run: |
          kubectl rollout undo deployment -n pathfinder-prod
          kubectl rollout status deployment -n pathfinder-prod
