# Omnisystem Helm Chart Values - Production Configuration

global:
  environment: production
  domain: omnisystem.example.com
  image:
    repository: omnisystem
    pullPolicy: IfNotPresent
    tag: "1.0.0"

# Omnisystem Gateway Deployment
omnisystem:
  replicaCount: 3

  image:
    repository: omnisystem/gateway
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  service:
    type: LoadBalancer
    port: 8080
    targetPort: 8080
    annotations:
      cloud.google.com/load-balancer-type: "External"

  ingress:
    enabled: true
    className: "nginx"
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/rate-limit: "100"
    hosts:
      - host: api.omnisystem.example.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: omnisystem-tls
        hosts:
          - api.omnisystem.example.com

  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 100
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

  # Liveness and Readiness probes
  livenessProbe:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /ready
      port: 8080
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 2

  # Pod Disruption Budget
  podDisruptionBudget:
    enabled: true
    minAvailable: 2

# PostgreSQL Configuration
postgresql:
  enabled: true
  auth:
    username: omnisystem
    password: "changeme"  # Override in production
    database: omnisystem

  primary:
    persistence:
      enabled: true
      size: 100Gi
      storageClassName: "pd-standard"

    resources:
      requests:
        memory: "1Gi"
        cpu: "500m"
      limits:
        memory: "4Gi"
        cpu: "2000m"

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

# Redis Configuration
redis:
  enabled: true
  auth:
    enabled: true
    password: "changeme"  # Override in production

  master:
    persistence:
      enabled: true
      size: 10Gi

  replica:
    replicaCount: 2
    persistence:
      enabled: true
      size: 10Gi

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

# Prometheus Configuration
prometheus:
  enabled: true
  prometheus:
    prometheusSpec:
      retention: 30d
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 50Gi

# Grafana Configuration
grafana:
  enabled: true
  adminPassword: "changeme"  # Override in production

  persistence:
    enabled: true
    size: 10Gi

  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          url: http://prometheus:9090
          isDefault: true

# Monitoring
monitoring:
  enabled: true
  prometheusRules:
    enabled: true
  servicemonitor:
    enabled: true

# Security
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  capabilities:
    drop:
      - ALL

podSecurityPolicy:
  enabled: true

networkPolicy:
  enabled: true
  policyTypes:
    - Ingress
    - Egress

# RBAC
rbac:
  create: true
  serviceAccount:
    create: true
    name: omnisystem

# Namespace
namespace:
  create: true
  name: omnisystem
