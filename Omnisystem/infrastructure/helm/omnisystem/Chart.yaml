apiVersion: v2
name: omnisystem
description: Enterprise distributed systems platform - 1,039+ microservices
type: application
version: 1.0.0
appVersion: "1.0.0"

keywords:
  - omnisystem
  - microservices
  - kubernetes
  - distributed-systems

home: https://omnisystem.example.com
sources:
  - https://github.com/omnisystem/omnisystem

maintainers:
  - name: Omnisystem Team
    email: team@omnisystem.com

dependencies:
  - name: postgresql
    version: "13.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled

  - name: redis
    version: "18.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled

  - name: prometheus
    version: "25.x.x"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: prometheus.enabled

  - name: grafana
    version: "7.x.x"
    repository: "https://grafana.github.io/helm-charts"
    condition: grafana.enabled
