[workspace]
members = [
    "crates/healthcare-ai-engine",
    "crates/diagnostic-ai",
    "crates/treatment-ai",
    "crates/clinical-decision-support",
    "crates/supply-chain-analytics",
    "crates/inventory-analytics",
    "crates/procurement-analytics",
    "crates/logistics-analytics",
    "crates/healthcare-compliance-deep",
    "crates/hipaa-engine",
    "crates/medical-compliance",
    "crates/patient-privacy",
    "crates/event-driven-architecture",
    "crates/event-broker",
    "crates/event-processor",
]

[workspace.package]
version = "1.0.0"
edition = "2021"
authors = ["Omnisystem Team"]
license = "Apache-2.0"
repository = "https://github.com/omnisystem/omnisystem"

[workspace.lints.rust]
