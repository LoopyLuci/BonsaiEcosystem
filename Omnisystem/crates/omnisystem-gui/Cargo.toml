[package]
name = "omnisystem-gui"
version.workspace = true
description = "Omnisystem GUI - Enterprise GPU Computing Platform"
authors = ["Omnisystem Project"]
edition = "2021"
rust-version = "1.70"

[package.metadata]
name = "omnisystem-gui"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["default"] }
omnisystem-async-runtime = { path = "../omnisystem-async-runtime" }
omnisystem-collections = { path = "../omnisystem-collections" }
omnisystem-time = { path = "../omnisystem-time" }
omnisystem-id-generation = { path = "../omnisystem-id-generation" }
omnisystem-observability = { path = "../omnisystem-observability" }

[[bin]]
name = "omnisystem-gui"
path = "src/main.rs"

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = 3
