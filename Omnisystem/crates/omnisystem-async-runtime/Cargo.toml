[package]
name = "omnisystem-async-runtime"
version = "1.0.0"
edition = "2021"
authors = ["Omnisystem Team"]
description = "Enterprise-grade async runtime - zero external dependencies"
license = "Apache-2.0"
repository = "https://github.com/omnisystem/omnisystem"

[[bin]]
name = "oar"
path = "src/bin/main.rs"

[dependencies]

[dev-dependencies]

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
panic = "abort"
