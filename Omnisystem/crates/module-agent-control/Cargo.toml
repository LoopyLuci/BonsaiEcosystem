[package]
name = "module-agent-control"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[dependencies]
module-interfaces = { path = "../module-interfaces" }
universal-module-registry = { path = "../universal-module-registry" }
universal-module-loader = { path = "../universal-module-loader" }
usee-search-engine = { path = "../usee-search-engine" }
tokio = { workspace = true, features = ["full"] }
dashmap = { workspace = true }
serde = { workspace = true, features = ["derive"] }
