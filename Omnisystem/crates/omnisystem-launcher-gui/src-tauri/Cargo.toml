[package]
name = "omnisystem-launcher-tauri"
version = "1.0.0"
description = "Native desktop launcher for Omnisystem"
authors = ["Omnisystem Team"]
edition = "2021"
rust-version = "1.70"
license = "MIT"
repository = "https://github.com/LoopyLuci/Omnisystem"
publish = false

[workspace]

[build-dependencies]
tauri-build = "1.5"

[dependencies]
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
tauri = { version = "1.5", features = ["shell-open"] }
tokio = { version = "1.35", features = ["full"] }
anyhow = "1.0"
thiserror = "1.0"
log = "0.4"
env_logger = "0.11"
dashmap = "5.5"
parking_lot = "0.12"
futures = "0.3"
async-trait = "0.1"

[dev-dependencies]
tokio = { version = "1.35", features = ["full"] }

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
