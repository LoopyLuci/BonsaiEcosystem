[package]
name = "brother-fax-driver"
version = "1.0.0"
edition = "2021"
authors = ["Bonsai Ecosystem <team@bonsai.sh>"]
license = "Apache-2.0"
description = "macOS DriverKit driver for Brother IntelliFAX 2840 using Universal Driver Conversion System"
repository = "https://github.com/bonsai/omnisystem"

[dependencies]
# No runtime dependencies for DriverKit driver itself
# (DriverKit provides all necessary frameworks)

[dev-dependencies]
# Test dependencies
tokio = { version = "1", features = ["full"] }

[[test]]
name = "test_driver"
path = "tests/test_driver.rs"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = true

[build]
# DriverKit drivers require special compilation
# Use CMake or Xcode for actual driver build
target = "x86_64-apple-darwin"
