name: pathfinder_mobile
description: PATHFINDER Learning Platform - Mobile App
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.0
  riverpod: ^2.3.0

  # HTTP & Networking
  http: ^1.1.0
  dio: ^5.2.0

  # Local Storage
  hive: ^2.2.0
  hive_flutter: ^1.1.0

  # Date/Time
  intl: ^0.18.1

  # Navigation
  go_router: ^8.0.0

  # UI
  flutter_svg: ^2.0.0
  cached_network_image: ^3.3.0

  # Utilities
  uuid: ^3.0.0
  logger: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
