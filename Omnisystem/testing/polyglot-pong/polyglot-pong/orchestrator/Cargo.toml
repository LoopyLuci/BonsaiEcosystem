[package]
name = "polyglot-pong-orchestrator"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "polyglot-pong-orchestrator"
path = "src/main.rs"

[dependencies]
polyglot-pong-common = { path = "../common" }
# ai-advisor = { version = "0.2" } # Will be available in production
async-trait = "0.1"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4", "serde"] }
clap = { version = "4", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1"
futures = "0.3"
dashmap = "5"

[dev-dependencies]
tokio-test = "0.4"
