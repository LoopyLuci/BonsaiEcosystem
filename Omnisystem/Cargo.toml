[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Omnisystem Contributors"]
license = "Apache-2.0"
repository = "https://github.com/omnisystem/platform"

[workspace.dependencies]
tokio = { version = "1.35", features = ["full"] }
async-trait = "0.1"
dashmap = "5.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
tracing-subscriber = "0.3"
thiserror = "1.0"
anyhow = "1.0"
uuid = { version = "1.6", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
tempfile = "3.8"
bytes = "1.5"
futures = "0.3"
axum = "0.7"
tower = "0.4"
http = "1.0"
parking_lot = "0.12"
arc-swap = "1.9"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
