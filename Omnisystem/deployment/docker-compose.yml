# PATHFINDER Docker Compose - Production Setup
# Multi-container orchestration with all services

version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: pathfinder-postgres
    environment:
      POSTGRES_DB: pathfinder
      POSTGRES_USER: pathfinder
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pathfinder"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pathfinder-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: pathfinder-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pathfinder-network

  # Neo4j Graph Database
  neo4j:
    image: neo4j:5-enterprise
    container_name: pathfinder-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-neo4j}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/var/lib/neo4j/data
    ports:
      - "7687:7687"
      - "7474:7474"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pathfinder-network

  # Kafka Message Broker
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: pathfinder-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    networks:
      - pathfinder-network

  # Zookeeper (for Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: pathfinder-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - pathfinder-network

  # User Service
  user-service:
    build:
      context: ./services/user
      dockerfile: Dockerfile
    container_name: pathfinder-user-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 8001
      DATABASE_URL: postgresql://pathfinder:${DB_PASSWORD:-postgres}@postgres:5432/pathfinder
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis}@redis:6379
      ENVIRONMENT: production
      LOG_LEVEL: info
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pathfinder-network
    restart: unless-stopped

  # Content Service
  content-service:
    build:
      context: ./services/content
      dockerfile: Dockerfile
    container_name: pathfinder-content-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 8002
      DATABASE_URL: postgresql://pathfinder:${DB_PASSWORD:-postgres}@postgres:5432/pathfinder
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis}@redis:6379
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pathfinder-network
    restart: unless-stopped

  # Teacher Service
  teacher-service:
    build:
      context: ./services/teacher
      dockerfile: Dockerfile
    container_name: pathfinder-teacher-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 8005
      DATABASE_URL: postgresql://pathfinder:${DB_PASSWORD:-postgres}@postgres:5432/pathfinder
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis}@redis:6379
    ports:
      - "8005:8005"
    networks:
      - pathfinder-network
    restart: unless-stopped

  # Parent Service
  parent-service:
    build:
      context: ./services/parent
      dockerfile: Dockerfile
    container_name: pathfinder-parent-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 8006
      DATABASE_URL: postgresql://pathfinder:${DB_PASSWORD:-postgres}@postgres:5432/pathfinder
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis}@redis:6379
    ports:
      - "8006:8006"
    networks:
      - pathfinder-network
    restart: unless-stopped

  # Notification Service
  notification-service:
    build:
      context: ./services/notification
      dockerfile: Dockerfile
    container_name: pathfinder-notification-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 8007
      DATABASE_URL: postgresql://pathfinder:${DB_PASSWORD:-postgres}@postgres:5432/pathfinder
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis}@redis:6379
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: 587
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@pathfinder.com}
      SMTP_FROM_PASSWORD: ${SMTP_FROM_PASSWORD}
    ports:
      - "8007:8007"
    networks:
      - pathfinder-network
    restart: unless-stopped

  # Achievement Service
  achievement-service:
    build:
      context: ./services/achievement
      dockerfile: Dockerfile
    container_name: pathfinder-achievement-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 8008
      DATABASE_URL: postgresql://pathfinder:${DB_PASSWORD:-postgres}@postgres:5432/pathfinder
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis}@redis:6379
    ports:
      - "8008:8008"
    networks:
      - pathfinder-network
    restart: unless-stopped

  # Learning Insights Service
  insights-service:
    build:
      context: ./services/insights
      dockerfile: Dockerfile
    container_name: pathfinder-insights-service
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: 8009
      DATABASE_URL: postgresql://pathfinder:${DB_PASSWORD:-postgres}@postgres:5432/pathfinder
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis}@redis:6379
    ports:
      - "8009:8009"
    networks:
      - pathfinder-network
    restart: unless-stopped

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: pathfinder-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    networks:
      - pathfinder-network

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: pathfinder-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: 'grafana-worldmap-panel'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3000:3000"
    networks:
      - pathfinder-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: pathfinder-nginx
    depends_on:
      - user-service
      - content-service
      - teacher-service
      - parent-service
      - notification-service
      - achievement-service
      - insights-service
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - pathfinder-network

networks:
  pathfinder-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  prometheus_data:
  grafana_data:
