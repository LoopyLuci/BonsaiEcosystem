apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: omnisystem
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
    - job_name: 'omnisystem'
      kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
          - omnisystem
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: kubernetes_pod_name

    alerting:
      alertmanagers:
      - static_configs:
        - targets:
          - alertmanager:9093

    rule_files:
    - /etc/prometheus/rules/*.yml

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: omnisystem
data:
  omnisystem.yml: |
    groups:
    - name: omnisystem
      interval: 30s
      rules:
      # Cluster health
      - alert: OmnisystemClusterUnhealthy
        expr: omnisystem_cluster_nodes_active < 3
        for: 2m
        annotations:
          summary: "Omnisystem cluster has less than 3 active nodes"

      # Leader election
      - alert: OmnisystemNoLeader
        expr: increase(omnisystem_election_count[5m]) == 0
        for: 1m
        annotations:
          summary: "Omnisystem has no active leader"

      # Consensus
      - alert: OmnisystemConsensusFailure
        expr: increase(omnisystem_consensus_failures[5m]) > 0
        for: 1m
        annotations:
          summary: "Omnisystem consensus failures detected"

      # Replication lag
      - alert: OmnisystemReplicationLag
        expr: omnisystem_replication_lag_ms > 1000
        for: 5m
        annotations:
          summary: "Omnisystem replication lag exceeds 1 second"

      # RPC latency
      - alert: OmnisystemHighRPCLatency
        expr: histogram_quantile(0.95, omnisystem_rpc_latency_ms) > 500
        for: 5m
        annotations:
          summary: "Omnisystem RPC p95 latency exceeds 500ms"

      # Memory pressure
      - alert: OmnisystemHighMemoryUsage
        expr: omnisystem_memory_bytes / 1024 / 1024 > 400
        for: 5m
        annotations:
          summary: "Omnisystem pod memory usage exceeds 400MB"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: omnisystem
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:latest
        args:
        - --config.file=/etc/prometheus/prometheus.yml
        - --storage.tsdb.path=/prometheus
        - --storage.tsdb.retention.time=30d
        ports:
        - containerPort: 9090
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
        - name: rules
          mountPath: /etc/prometheus/rules
        - name: storage
          mountPath: /prometheus
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: config
        configMap:
          name: prometheus-config
      - name: rules
        configMap:
          name: prometheus-rules
      - name: storage
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: omnisystem
spec:
  type: ClusterIP
  ports:
  - port: 9090
    targetPort: 9090
  selector:
    app: prometheus
