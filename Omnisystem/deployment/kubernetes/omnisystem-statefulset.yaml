apiVersion: v1
kind: Namespace
metadata:
  name: omnisystem

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: omnisystem-config
  namespace: omnisystem
data:
  cluster.yaml: |
    cluster:
      name: omnisystem-prod
      mode: distributed
      election_timeout_ms: 1500
      heartbeat_interval_ms: 150
      min_quorum_percent: 50

---
apiVersion: v1
kind: Service
metadata:
  name: omnisystem-headless
  namespace: omnisystem
  labels:
    app: omnisystem
spec:
  clusterIP: None
  selector:
    app: omnisystem
  ports:
  - name: rpc
    port: 8080
    targetPort: 8080
  - name: network
    port: 8081
    targetPort: 8081
  - name: metrics
    port: 9090
    targetPort: 9090

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: omnisystem
  namespace: omnisystem
spec:
  serviceName: omnisystem-headless
  replicas: 5
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: omnisystem
  template:
    metadata:
      labels:
        app: omnisystem
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - omnisystem
              topologyKey: kubernetes.io/hostname
      containers:
      - name: omnisystem
        image: omnisystem:latest
        imagePullPolicy: Always
        ports:
        - name: rpc
          containerPort: 8080
          protocol: TCP
        - name: network
          containerPort: 8081
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        env:
        - name: OMNISYSTEM_NODE_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: OMNISYSTEM_CLUSTER_PEERS
          value: "omnisystem-0.omnisystem-headless.omnisystem.svc.cluster.local,omnisystem-1.omnisystem-headless.omnisystem.svc.cluster.local,omnisystem-2.omnisystem-headless.omnisystem.svc.cluster.local,omnisystem-3.omnisystem-headless.omnisystem.svc.cluster.local,omnisystem-4.omnisystem-headless.omnisystem.svc.cluster.local"
        - name: RUST_LOG
          value: "omnisystem=info,tokio=debug"
        livenessProbe:
          httpGet:
            path: /health
            port: metrics
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: metrics
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: config
          mountPath: /etc/omnisystem
        - name: data
          mountPath: /var/lib/omnisystem
      volumes:
      - name: config
        configMap:
          name: omnisystem-config
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: standard
      resources:
        requests:
          storage: 10Gi

---
apiVersion: v1
kind: Service
metadata:
  name: omnisystem-lb
  namespace: omnisystem
  labels:
    app: omnisystem
spec:
  type: LoadBalancer
  selector:
    app: omnisystem
  ports:
  - name: rpc
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: network
    port: 8081
    targetPort: 8081
    protocol: TCP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: omnisystem-hpa
  namespace: omnisystem
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: omnisystem
  minReplicas: 5
  maxReplicas: 100
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 4
        periodSeconds: 15
      selectPolicy: Max
