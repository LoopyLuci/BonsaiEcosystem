[package]
name = "ucc-gui"
version = "1.0.0"
edition = "2021"
authors = ["UCC Team <team@ucc.dev>"]
description = "Production-grade GUI for Universal Cross-Compiler (UCC) with real-time metrics, build graph visualization, and live diagnostics"

[[bin]]
name = "ucc-gui"
path = "src/main.rs"

[dependencies]
# GUI Framework
egui = "0.28"
eframe = "0.28"

# UCC integration
ucc = { path = "../ucc" }

# Async runtime
tokio = { version = "1.40", features = ["full"] }
tokio-util = "0.7"

# Visualization
egui_plot = "0.28"

# File operations
walkdir = "2.4"
notify = "6.1"
rfd = "0.14"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Utilities
chrono = "0.4"
uuid = { version = "1.0", features = ["v4"] }
colored = "2.1"
indexmap = "2.0"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Logging
log = "0.4"
env_logger = "0.11"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
