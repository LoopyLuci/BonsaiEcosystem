[package]
name = "ucc"
version = "1.0.0"
edition = "2021"
authors = ["UCC Team <team@ucc.dev>"]
description = "Universal Cross-Compiler - Production-grade polyglot compiler with cross-compilation, distributed builds, intelligent caching, and IDE integration"
license = "Apache-2.0 OR MIT"
repository = "https://github.com/ucc/ucc"
documentation = "https://docs.ucc.dev"
homepage = "https://ucc.dev"

[[bin]]
name = "ucc"
path = "src/main.rs"

[dependencies]
# Async Runtime
tokio = { version = "1.40", features = ["full"] }
tokio-util = "0.7"

# Parallelization
rayon = "1.10"

# Hashing & Cryptography
blake3 = "1.5"
sha2 = "0.10"
hex = "0.4"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
yaml-rust = "0.4"

# Caching
lru = "0.12"

# CLI
clap = { version = "4.5", features = ["derive", "cargo"] }
colored = "2.1"
indicatif = "0.17"
dialoguer = "0.11"

# Logging & Tracing
log = "0.4"
env_logger = "0.11"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error Handling
anyhow = "1.0"
thiserror = "1.0"

# File System & Path Handling
walkdir = "2.4"
notify = "6.1"
tempfile = "3.10"
directories = "5.0"
path-clean = "1.0"

# String Processing
regex = "1.10"
lazy_static = "1.4"

# Utilities
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
parking_lot = "0.12"
crossbeam = "0.8"
dashmap = "5.5"
futures = "0.3"

# System Information
sysinfo = "0.30"
num_cpus = "1.16"

# Metrics & Monitoring
prometheus = "0.13"

# GUI (future phases)
egui = "0.28"
eframe = "0.28"

# File Dialogs
rfd = "0.14"

# Diff & Comparison
similar = "2.3"

# Process Management
which = "6.0"

[dev-dependencies]
criterion = "0.5"
proptest = "1.4"
tempfile = "3.10"
mockito = "1.2"

[profile.dev]
opt-level = 1

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true

[profile.bench]
inherits = "release"

[workspace]
members = []

[lib]
name = "ucc"
path = "src/lib.rs"
