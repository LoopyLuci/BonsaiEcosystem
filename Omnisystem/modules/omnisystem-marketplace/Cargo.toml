[package]
name = "omnisystem-marketplace"
version = "1.0.0"
edition = "2021"
authors = ["Omnisystem Team"]
description = "Omnisystem Module Marketplace - Discover, install, and manage modules"
license = "Apache-2.0 OR MIT"

[dependencies]
# Web Framework
actix-web = "4.4"
actix-rt = "2.9"

# Omnisystem
omnisystem-core = { path = "../omnisystem-core" }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"

# Database (for module registry)
serde_derive = "1.0"

# Async
tokio = { version = "1.40", features = ["full"] }
futures = "0.3"

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# Logging
log = "0.4"
env_logger = "0.11"

# Utilities
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
