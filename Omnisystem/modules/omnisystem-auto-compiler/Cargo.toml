[package]
name = "omnisystem-auto-compiler"
version = "1.0.0"
edition = "2021"
authors = ["Omnisystem Team"]
description = "Next-generation Self-Assembler and Auto-Compiler - Zero manual compilation required, but fully capable when desired"
license = "Apache-2.0 OR MIT"

[dependencies]
# Core dependencies
tokio = { version = "1.40", features = ["full"] }
tokio-util = "0.7"

# Module system
omnisystem-core = { path = "../omnisystem-core" }
omnisystem-module-manager = { path = "../omnisystem-module-manager" }
omnisystem-runtime-provisioner = { path = "../omnisystem-runtime-provisioner" }

# File watching
notify = "6.1"
walkdir = "2.4"

# Async utilities
futures = "0.3"
parking_lot = "0.12"
crossbeam = "0.8"
dashmap = "5.5"

# Parallelization
rayon = "1.10"

# Hashing & Caching
blake3 = "1.5"
lru = "0.12"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"

# Logging & Monitoring
log = "0.4"
env_logger = "0.11"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# Utilities
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
regex = "1.10"
lazy_static = "1.4"
which = "6.0"

# CLI & UI
clap = { version = "4.5", features = ["derive", "cargo"] }
colored = "2.1"
indicatif = "0.17"
dialoguer = "0.11"

# File system
directories = "5.0"
tempfile = "3.10"

# System info
sysinfo = "0.30"
num_cpus = "1.16"

[dev-dependencies]
criterion = "0.5"
tempfile = "3.10"
mockito = "1.2"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
