[package]
name = "omnisystem-core"
version = "1.0.0"
edition = "2021"
authors = ["Omnisystem Team <team@omnisystem.dev>"]
description = "Universal Omnisystem Core - Module registry, capability system, and runtime orchestration"
license = "Apache-2.0 OR MIT"

[dependencies]
# Async Runtime
tokio = { version = "1.40", features = ["full"] }
tokio-util = "0.7"

# Concurrency & Data Structures
dashmap = "5.5"
parking_lot = "0.12"
arc-swap = "1.7"
crossbeam = "0.8"
num_cpus = "1.16"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"

# Error Handling
thiserror = "1.0"
anyhow = "1.0"

# Logging
log = "0.4"
tracing = "0.1"

# Utilities
uuid = { version = "1.0", features = ["v4", "serde"] }
regex = "1.10"

# System & Paths
directories = "5.0"
lazy_static = "1.4"

[dev-dependencies]
tempfile = "3.10"
criterion = "0.5"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
