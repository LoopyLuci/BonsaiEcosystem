[package]
name = "bonsai-rust-compiler-gui"
version = "1.0.0"
edition = "2021"

[[bin]]
name = "rust-compiler-gui"
path = "src/main.rs"

[dependencies]
# GUI Framework
egui = "0.28"
eframe = "0.28"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# File Watching
notify = "6.1"

# Async Runtime
tokio = { version = "1.0", features = ["rt", "macros", "sync"] }

# Utilities
anyhow = "1.0"
thiserror = "1.0"
dirs = "5.0"

# Code Syntax Highlighting
syntect = "5.1"

# File Dialogs
rfd = "0.14"

[dev-dependencies]
criterion = "0.5"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
