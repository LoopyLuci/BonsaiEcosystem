[app]
id          = "ai.bonsai.launcher"
name        = "Bonsai Launcher"
tagline     = "Your app menu and system control"
description = "Universal launcher, control panel, and app menu for the entire BonsaiWorkspace ecosystem"
version     = "1.0.0"
channel     = "stable"
category    = "system"
icon        = "assets/launcher.svg"

[app.launch]
binary      = "bonsai-launcher"
deep_link   = "bonsai://launcher"
health_check = "http://localhost:11450/health"

[app.platform]
windows     = true
macos       = true
linux       = true
android     = false
ios         = false

[app.capabilities]
required    = ["system.tray", "ipc.local", "process.manage"]
optional    = ["network.local"]

[app.docs]
overview    = "docs/reference/launcher.md"
quickstart  = "docs/reference/launcher-quick-start.md"
changelog   = "CHANGELOG.md"

[app.simple]
what_it_does = "Your app menu and system control center — launch any app and manage your Bonsai computer"
first_steps  = ["Click the Bonsai leaf icon", "Click an app to launch it", "Use search to find apps or docs"]

[app.developer]
crate        = "bonsai-launcher"
api_port     = 11450
source_path  = "BonsaiEcosystem/launcher"
