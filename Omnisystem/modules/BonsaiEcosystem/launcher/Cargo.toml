[package]
name = "bonsai-launcher"
version = "1.0.0"
edition = "2021"
description = "BonsaiWorkspace universal launcher, app menu, and control center"

[dependencies]
tauri = { version = "2.0", features = ["protocol-asset", "custom-protocol", "tray-icon", "devtools"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
anyhow = "1"
thiserror = "1"
tracing = "0.1"
tracing-subscriber = "0.3"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
reqwest = { version = "0.11", features = ["json"] }
open = "5.0"

# External crates
app-registry = { path = "../../Omnisystem/crates/app-registry" }
error-registry = { path = "../../Omnisystem/crates/error-registry" }

[target.'cfg(windows)'.dependencies]
winapi = "0.3"

[build-dependencies]
tauri-build = "2.0"

[[bin]]
name = "bonsai-launcher"
path = "src-tauri/src/main.rs"
