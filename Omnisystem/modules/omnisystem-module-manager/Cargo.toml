[package]
name = "omnisystem-module-manager"
version = "1.0.0"
edition = "2021"
authors = ["Omnisystem Team"]
description = "Universal Module and Package Manager - Language-agnostic module/package loading and management"
license = "Apache-2.0 OR MIT"

[dependencies]
omnisystem-core = { path = "../omnisystem-core" }

# Async Runtime
tokio = { version = "1.40", features = ["full"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"

# Hashing
blake3 = "1.5"
sha2 = "0.10"

# Package Management
reqwest = { version = "0.11", features = ["json"] }

# File System
walkdir = "2.4"
tempfile = "3.10"

# Error Handling
thiserror = "1.0"
anyhow = "1.0"

# Logging
log = "0.4"

# Utilities
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
parking_lot = "0.12"
dashmap = "5.5"

# Compression
flate2 = "1.0"
tar = "0.4"

# Versioning
semver = "1.0"

[dev-dependencies]
tempfile = "3.10"
tokio-test = "0.4"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
