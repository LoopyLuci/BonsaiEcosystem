[module]
name = "omnisystem-networking"
version = "1.0.0"
description = "P2P networking with multi-path routing"
author = "Omnisystem Team"

[module.capabilities]
"networking:p2p" = { enabled = true, description = "P2P communication" }
"networking:relay" = { enabled = true, description = "Relay services" }
"networking:multi-path" = { enabled = true, description = "Multi-path routing" }
"networking:encryption" = { enabled = true, description = "Network encryption" }

[omnios_mode]
relay_enabled = true
multi_path_routing = true
max_connections = 1024

[bonsai_mode]
relay_enabled = false
multi_path_routing = false
max_connections = 64

[module.config]
p2p_enabled = true
relay_enabled = true
multi_path_routing = true
max_connections = 1024
listen_port = 0
