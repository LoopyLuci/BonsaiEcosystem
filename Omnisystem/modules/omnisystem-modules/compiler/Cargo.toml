[package]
name = "omnisystem-compiler-module"
version = "1.0.0"
edition = "2021"
authors = ["Omnisystem Team <team@omnisystem.dev>"]
description = "Universal Compiler Module - Multi-language compilation with distributed builds, intelligent caching, and IDE integration"
license = "Apache-2.0 OR MIT"

[dependencies]
# Core Omnisystem
omnisystem-core = { path = "../../omnisystem-core" }

# Async Runtime
tokio = { version = "1.40", features = ["full"] }
tokio-util = "0.7"

# Parallelization
rayon = "1.10"

# Hashing & Cryptography
blake3 = "1.5"
sha2 = "0.10"
hex = "0.4"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"

# Caching
lru = "0.12"

# CLI & Logging
log = "0.4"
env_logger = "0.11"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error Handling
anyhow = "1.0"
thiserror = "1.0"

# File System & Path Handling
walkdir = "2.4"
notify = "6.1"
tempfile = "3.10"
directories = "5.0"

# String Processing
regex = "1.10"
lazy_static = "1.4"

# Utilities
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
parking_lot = "0.12"
crossbeam = "0.8"
dashmap = "5.5"
futures = "0.3"

# System Information
sysinfo = "0.30"
num_cpus = "1.16"

# Process Management
which = "6.0"

[dev-dependencies]
criterion = "0.5"
proptest = "1.4"
tempfile = "3.10"
mockito = "1.2"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
