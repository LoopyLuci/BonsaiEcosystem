# Omnisystem Compiler Module Manifest
# Universal cross-compiler with multi-language support, distributed builds, and IDE integration

[module]
name = "omnisystem-compiler"
version = "1.0.0"
description = "Universal Cross-Compiler - Multi-language compilation with distributed builds, intelligent caching, and IDE integration"
author = "Omnisystem Team"
repository = "https://github.com/omnisystem/omnisystem"

# Module dependencies on other modules
[module.dependencies]
# Compiler doesn't depend on other modules
# It provides capabilities that other modules might depend on

# Capabilities this module provides
[module.capabilities]
# Core compilation capabilities
"compiler:rust" = { enabled = true, description = "Rust language compilation" }
"compiler:c" = { enabled = true, description = "C language compilation" }
"compiler:cpp" = { enabled = true, description = "C++ language compilation" }
"compiler:go" = { enabled = true, description = "Go language compilation" }
"compiler:zig" = { enabled = true, description = "Zig language compilation" }
"compiler:titan" = { enabled = true, description = "Titan language compilation" }
"compiler:python" = { enabled = true, description = "Python language support" }
"compiler:typescript" = { enabled = true, description = "TypeScript/JavaScript support" }
"compiler:javascript" = { enabled = true, description = "JavaScript language support" }
"compiler:java" = { enabled = true, description = "Java language compilation" }
"compiler:kotlin" = { enabled = true, description = "Kotlin language compilation" }
"compiler:csharp" = { enabled = true, description = "C# language compilation" }
"compiler:objective-c" = { enabled = true, description = "Objective-C compilation" }
"compiler:swift" = { enabled = true, description = "Swift language compilation" }
"compiler:d" = { enabled = true, description = "D language compilation" }
"compiler:haskell" = { enabled = true, description = "Haskell language compilation" }

# Advanced features
"compiler:distributed" = {
    enabled = true,
    description = "Distributed compilation across worker nodes",
    dependencies = ["compiler:base"]
}
"compiler:caching" = {
    enabled = true,
    description = "Content-addressed caching with Blake3",
    dependencies = ["compiler:base"]
}
"compiler:ide-integration" = {
    enabled = true,
    description = "IDE integration (VSCode, JetBrains)",
    dependencies = ["compiler:base"]
}
"compiler:hardening" = {
    enabled = true,
    description = "Production hardening and testing framework",
    dependencies = ["compiler:base"]
}
"compiler:cross-compile" = {
    enabled = true,
    description = "Cross-compilation to 50+ targets",
    dependencies = ["compiler:base"]
}

# OmniOS vs Bonsai mode configuration
[omnios_mode]
# Full features enabled in OmniOS
distributed_compilation = true
remote_caching = true
ide_integration = true
production_hardening = true
max_workers = 64
cache_size_mb = 2048

[bonsai_mode]
# Lightweight subset in Bonsai mode
distributed_compilation = false
remote_caching = false
ide_integration = true  # Keep IDE support for usability
production_hardening = true
max_workers = 4
cache_size_mb = 256

# Configuration schema
[module.config]
enabled_languages = ["rust", "c", "cpp", "go", "zig", "python", "typescript", "javascript"]
distributed_enabled = true
caching_enabled = true
cache_size_mb = 512
cache_dir = "~/.omnisystem/modules/compiler/cache"
ide_port = 3030
max_workers = 8

# Data locations
[module.data]
system_data = "modules/compiler"
user_data = "modules/compiler"
device_data = "modules/compiler"
temp_data = "modules/compiler"

# Health check configuration
[module.health]
check_interval_ms = 60000
timeout_ms = 5000

# Performance targets
[module.performance]
compile_cache_hit_rate_target = 0.90
distributed_speedup_target = 8.0
incremental_build_time_ms = 1000

# Security settings
[module.security]
require_capability_check = true
enable_audit_logging = true
sandbox_workers = true

# Metadata
[module.metadata]
license = "Apache-2.0 OR MIT"
homepage = "https://omnisystem.dev"
documentation = "https://docs.omnisystem.dev/compiler"
keywords = ["compiler", "build", "distributed", "caching", "ide"]
