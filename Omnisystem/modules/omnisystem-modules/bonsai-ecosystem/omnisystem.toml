[module]
name = "omnisystem-bonsai-ecosystem"
version = "1.0.0"
description = "Bonsai Ecosystem - Desktop launcher, UOSC runtime, and orchestration"
author = "Omnisystem Team"

[module.capabilities]
"bonsai:launcher" = { enabled = true, description = "Desktop launcher application" }
"bonsai:runtime" = { enabled = true, description = "UOSC runtime environment" }
"bonsai:orchestration" = { enabled = true, description = "Service orchestration" }
"bonsai:ui" = { enabled = true, description = "User interface" }

[omnios_mode]
launcher_enabled = true
runtime_enabled = true
orchestration_enabled = true
auto_start = true

[bonsai_mode]
launcher_enabled = true
runtime_enabled = true
orchestration_enabled = false
auto_start = true

[module.config]
launcher_enabled = true
runtime_enabled = true
orchestration_enabled = true
ui_theme = "auto"
auto_start = true
