[package]
name = "omnisystem-bonsai-ecosystem-module"
version = "1.0.0"
edition = "2021"
authors = ["Omnisystem Team"]
description = "Omnisystem Bonsai Ecosystem Module - Desktop launcher, runtime, and orchestration"
license = "Apache-2.0 OR MIT"

[dependencies]
omnisystem-core = { path = "../../omnisystem-core" }
tokio = { version = "1.40", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
log = "0.4"
thiserror = "1.0"
parking_lot = "0.12"
uuid = { version = "1.0", features = ["v4", "serde"] }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
