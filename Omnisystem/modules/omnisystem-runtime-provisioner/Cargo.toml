[package]
name = "omnisystem-runtime-provisioner"
version = "1.0.0"
edition = "2021"
authors = ["Omnisystem Team"]
description = "Self-contained runtime provisioner - Auto-downloads and caches language-specific toolchains for 100% independence"
license = "Apache-2.0 OR MIT"

[dependencies]
# Async
tokio = { version = "1.40", features = ["full"] }
tokio-util = "0.7"

# HTTP Downloads
reqwest = { version = "0.11", features = ["stream", "json"] }

# File Operations
walkdir = "2.4"
tempfile = "3.10"
directories = "5.0"
flate2 = "1.0"
tar = "0.4"
zip = "0.6"

# Hashing
blake3 = "1.5"
sha2 = "0.10"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"

# Error Handling
thiserror = "1.0"
anyhow = "1.0"

# Logging
log = "0.4"
env_logger = "0.11"
tracing = "0.1"

# Utilities
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
parking_lot = "0.12"
dashmap = "5.5"

# CLI Progress
indicatif = "0.17"

# System Info
sysinfo = "0.30"

[dev-dependencies]
criterion = "0.5"
tempfile = "3.10"
mockito = "1.2"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
