[package]
name = "omnisystem-cli"
version = "1.0.0"
edition = "2021"
authors = ["Omnisystem Team <team@omnisystem.dev>"]
description = "Omnisystem CLI - Command-line interface for universal module management"
license = "Apache-2.0 OR MIT"

[[bin]]
name = "omnisystem"
path = "src/main.rs"

[dependencies]
omnisystem-core = { path = "../omnisystem-core" }
omnisystem-compiler-module = { path = "../omnisystem-modules/compiler" }
omnisystem-messaging-module = { path = "../omnisystem-modules/messaging" }
omnisystem-storage-module = { path = "../omnisystem-modules/storage" }
omnisystem-networking-module = { path = "../omnisystem-modules/networking" }
omnisystem-bonsai-ecosystem-module = { path = "../omnisystem-modules/bonsai-ecosystem" }

# CLI Framework
clap = { version = "4.5", features = ["derive", "cargo"] }
colored = "2.1"
indicatif = "0.17"
dialoguer = "0.11"

# Async Runtime
tokio = { version = "1.40", features = ["full"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"

# Logging
log = "0.4"
env_logger = "0.11"

# Error Handling
anyhow = "1.0"
thiserror = "1.0"

# Utilities
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
parking_lot = "0.12"

# Table formatting for CLI output
prettytable-rs = "0.11"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
