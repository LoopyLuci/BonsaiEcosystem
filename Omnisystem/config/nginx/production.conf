# PATHFINDER Production Nginx Configuration
# Reverse proxy, load balancing, and API gateway

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 10000;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    log_format json_combined escape=json
    '{'
      '"time_local":"$time_local",'
      '"remote_addr":"$remote_addr",'
      '"remote_user":"$remote_user",'
      '"request":"$request",'
      '"status": "$status",'
      '"body_bytes_sent":"$body_bytes_sent",'
      '"request_time":"$request_time",'
      '"http_referrer":"$http_referer",'
      '"http_user_agent":"$http_user_agent",'
      '"upstream_addr":"$upstream_addr",'
      '"upstream_status":"$upstream_status",'
      '"upstream_response_time":"$upstream_response_time",'
      '"upstream_connect_time":"$upstream_connect_time",'
      '"upstream_header_time":"$upstream_header_time"'
    '}';

    access_log /var/log/nginx/access.log json_combined;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 100;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $http_x_forwarded_for zone=api_limit_xff:10m rate=100r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # Upstream backend services
    upstream user_service {
        least_conn;
        server user-service:8001 max_fails=3 fail_timeout=30s;
        server user-service:8001 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream content_service {
        least_conn;
        server content-service:8002 max_fails=3 fail_timeout=30s;
        server content-service:8002 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream personalization_service {
        least_conn;
        server personalization-service:8003 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream progress_service {
        least_conn;
        server progress-service:8004 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream teacher_service {
        least_conn;
        server teacher-service:8005 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream parent_service {
        least_conn;
        server parent-service:8006 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream notification_service {
        least_conn;
        server notification-service:8007 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream achievement_service {
        least_conn;
        server achievement-service:8008 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream insights_service {
        least_conn;
        server insights-service:8009 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Cache configuration
    proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:10m max_size=1g inactive=60m use_temp_path=off;
    proxy_cache_path /var/cache/nginx/static levels=1:2 keys_zone=static_cache:50m max_size=5g inactive=1d use_temp_path=off;

    # HTTP to HTTPS redirect
    server {
        listen 80;
        listen [::]:80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # Main HTTPS server
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name api.pathfinder.com;

        # SSL configuration
        ssl_certificate /etc/ssl/certs/pathfinder.crt;
        ssl_certificate_key /etc/ssl/private/pathfinder.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;
        ssl_trusted_certificate /etc/ssl/certs/ca-bundle.crt;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Status endpoint
        location /status {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # API v1 routes
        location /v1/ {
            limit_req zone=api_limit burst=20 nodelay;
            limit_conn addr 10;

            # Request timeout
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";
            proxy_http_version 1.1;

            # Caching
            proxy_cache api_cache;
            proxy_cache_key "$scheme$host$request_uri$http_authorization";
            proxy_cache_use_stale error timeout updating invalid_header http_500 http_502 http_503 http_504;
            proxy_cache_valid 200 10m;
            proxy_cache_valid 404 1m;
            add_header X-Cache-Status $upstream_cache_status;

            # Route to appropriate service based on path
            if ($uri ~ ^/v1/auth/) {
                proxy_pass http://user_service;
            }
            if ($uri ~ ^/v1/users/) {
                proxy_pass http://user_service;
            }
            if ($uri ~ ^/v1/skills/) {
                proxy_pass http://content_service;
            }
            if ($uri ~ ^/v1/exercises/) {
                proxy_pass http://content_service;
            }
            if ($uri ~ ^/v1/content/) {
                proxy_pass http://content_service;
            }
            if ($uri ~ ^/v1/personalization/) {
                proxy_pass http://personalization_service;
            }
            if ($uri ~ ^/v1/progress/) {
                proxy_pass http://progress_service;
            }
            if ($uri ~ ^/v1/teachers/) {
                proxy_pass http://teacher_service;
            }
            if ($uri ~ ^/v1/parents/) {
                proxy_pass http://parent_service;
            }
            if ($uri ~ ^/v1/notifications/) {
                proxy_pass http://notification_service;
            }
            if ($uri ~ ^/v1/achievements/) {
                proxy_pass http://achievement_service;
            }
            if ($uri ~ ^/v1/insights/) {
                proxy_pass http://insights_service;
            }
            if ($uri ~ ^/v1/leaderboard/) {
                proxy_pass http://achievement_service;
            }
            if ($uri ~ ^/v1/goals/) {
                proxy_pass http://achievement_service;
            }

            # Default fallback
            proxy_pass http://user_service;
        }

        # Static assets (with aggressive caching)
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            expires 365d;
            add_header Cache-Control "public, immutable";
            proxy_cache static_cache;
            proxy_cache_valid 200 365d;
            proxy_cache_use_stale error timeout updating invalid_header http_500 http_502 http_503 http_504;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # Block access to sensitive files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        location ~ ~$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        # 404 handling
        error_page 404 /404.json;
        location = /404.json {
            internal;
            default_type application/json;
            return 404 '{"error":"Not found"}';
        }

        # 502/503 handling
        error_page 502 503 504 /50x.json;
        location = /50x.json {
            internal;
            default_type application/json;
            return 503 '{"error":"Service temporarily unavailable"}';
        }
    }

    # Metrics server for Prometheus
    server {
        listen 9113;
        location /metrics {
            access_log off;
            return 200 "nginx_up 1\n";
            add_header Content-Type text/plain;
        }
    }
}
