forced_failure_finder:
  enabled: true

  general:
    max_workers: 4
    max_concurrent_campaigns: 2
    schedule: "idle"          # "idle" | "always" | "nightly" | "manual"
    nightly_cron: "0 2 * * *" # 2 AM every night

  resources:
    default_budget:
      cpu_cores: 2
      ram_mb: 4096
      timeout_secs: 3600
      priority: low

  failure_handling:
    auto_report_to_kb: true
    auto_create_issue: true
    auto_fix_attempt: false   # set true to let BugFixer try automatically
    max_auto_fix_attempts: 3
    dedup_by_fingerprint: true

  presets:
    - name: "tauri_filesystem"
      enabled: true
      schedule: "nightly"
      targets: ["write_file", "read_file", "delete_file", "list_directory"]
      strategy: input_fuzzing
      iterations: 100000

    - name: "swarm_agent"
      enabled: true
      schedule: "nightly"
      targets: ["swarm_create", "swarm_send_command", "swarm_cancel"]
      strategy: state_fuzzing
      sequences: 50000

    - name: "crdt_concurrency"
      enabled: true
      schedule: "nightly"
      strategy: property_based
      samples: 50000

    - name: "resource_exhaustion"
      enabled: true
      schedule: "weekly"
      strategy: resource_exhaustion

sandbox_nervous_system:
  enabled: true
  default_tier: "wasm"        # default isolation tier for new components
  violation_action: "block"   # "block" | "warn" | "log"
  auto_report_violations: true
  max_memory_per_sandbox_mb: 512
  max_cpu_per_sandbox_pct: 50.0
