# Metadata for all 1,039+ crates
crate_metadata:
  total_crates: 1039
  total_phases: 240
  total_tests: 4156
  total_loc_target: 60000
  testing_per_crate: 4
  integration_tests_per_crate: 3

database_backends:
  postgresql:
    description: "PostgreSQL for transactional data"
    connection_pooling: true
    replication: true
    backup_strategy: "WAL archiving"

  dynamodb:
    description: "DynamoDB for NoSQL needs"
    scaling: "on-demand"
    backup_strategy: "point-in-time recovery"

  redis:
    description: "Redis for caching and sessions"
    persistence: "RDB + AOF"
    clustering: true

api_patterns:
  rest:
    - POST /resource
    - GET /resource/{id}
    - PUT /resource/{id}
    - DELETE /resource/{id}
    - GET /resources

  websocket:
    - WS /stream
    - WS /subscribe/{topic}

  grpc:
    - proto definitions
    - streaming endpoints

monitoring:
  metrics:
    - request_rate
    - error_rate
    - latency_p50_p95_p99
    - database_connections
    - memory_usage
    - cpu_usage
    - cache_hit_rate

  alerts:
    - high_error_rate: "> 5%"
    - high_latency: "p99 > 1s"
    - db_connection_pool: "> 90%"
    - memory_usage: "> 90%"
    - service_down: "up == 0"
