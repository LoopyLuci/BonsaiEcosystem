# Omnisystem Workspace Configuration

[workspace]
name = "omnisystem"
version = "0.1.0"
edition = "2026"
description = "Bonsai Ecosystem & USOS rebuilt in the Omni-languages"
authors = ["The Bonsai Team"]
license = "Apache-2.0"

[workspace.package]
rust-version = "1.75"
repository = "https://github.com/anthropics/omnisystem"
homepage = "https://omnisystem.dev"

# Workspace members
[workspace.members]
kernel = { path = "kernel" }
languages = { path = "languages" }
stdlib = { path = "stdlib" }
services = { path = "services" }
apps = { path = "apps" }
build = { path = "build" }

# Languages configuration
[languages]
titan = { version = "0.1.0", path = "languages/titan" }
sylva = { version = "0.1.0", path = "languages/sylva" }
aether = { version = "0.1.0", path = "languages/aether" }
axiom = { version = "0.1.0", path = "languages/axiom" }

# Kernel configuration
[kernel]
name = "omni-kernel"
language = "titan"
target = "x86_64-unknown-none"
optimization = "aggressive"
strip = true
enable_lto = true
profile = "release"

# Standard library
[stdlib]
names = ["core", "io", "sync", "collections", "fs", "net", "thread", "simd", "alloc"]
verification = "axiom"  # Run Axiom proofs on all stdlib components

# Core services (Tier 1)
[[services]]
name = "omni-p2p"
language = "aether"
depends_on = ["omni-compress"]
tier = 1
verification = "axiom"
tests = 40
min_throughput_mbps = 1000
max_latency_ms = 100

[[services]]
name = "omni-observability"
language = "titan"
depends_on = []
tier = 1
verification = "axiom"
tests = 35
min_throughput_logs_per_sec = 1000000
max_query_latency_ms = 100

[[services]]
name = "omni-container"
language = "titan"
depends_on = []
tier = 1
verification = "axiom"
tests = 30
max_startup_latency_ms = 10

[[services]]
name = "omni-compress"
language = "titan"
depends_on = []
tier = 1
verification = "axiom"
tests = 50

# System services (Tier 2)
[[services]]
name = "omni-vfs"
language = "titan"
depends_on = ["omni-observability"]
tier = 2
verification = "axiom"
tests = 45

[[services]]
name = "omni-enclave"
language = "titan"
depends_on = ["omni-p2p"]
tier = 2
verification = "none"
tests = 25

[[services]]
name = "omni-compiler"
language = "titan"
depends_on = ["omni-p2p"]
tier = 2
verification = "axiom"
tests = 60

# Business logic services (Tier 3)
[[services]]
name = "omni-ai"
language = "aether"
depends_on = ["omni-p2p", "omni-observability"]
tier = 3
verification = "axiom"
tests = 50

[[services]]
name = "omni-knowledge"
language = "titan"
depends_on = ["omni-observability"]
tier = 3
verification = "none"
tests = 40

[[services]]
name = "omni-media"
language = "aether"
depends_on = ["omni-p2p", "omni-compress"]
tier = 3
verification = "none"
tests = 35

[[services]]
name = "omni-bot"
language = "sylva"
depends_on = ["omni-p2p"]
tier = 3
verification = "none"
tests = 25

[[services]]
name = "omni-qa"
language = "titan"
depends_on = ["omni-observability"]
tier = 3
verification = "axiom"
tests = 45

# Optional services (Tier 4)
[[services]]
name = "omni-blockchain"
language = "titan"
depends_on = ["omni-p2p"]
tier = 4
verification = "axiom"
tests = 50
optional = true

# Applications
[[apps]]
name = "omni-ide"
language = "titanui"
description = "Omnisystem IDE (VSCode integration)"
depends_on = ["omni-compiler", "omni-observability"]

[[apps]]
name = "omni-dashboard"
language = "sylva"
description = "System observability dashboard"
depends_on = ["omni-observability"]

# Build profiles
[profile.dev]
optimization_level = 0
debug = true
debug_assertions = true
overflow_checks = true
lto = false
codegen_units = 256

[profile.release]
optimization_level = 3
debug = false
debug_assertions = false
overflow_checks = false
lto = "fat"
codegen_units = 1
strip = true

[profile.bench]
optimization_level = 3
debug = false
debug_assertions = false
overflow_checks = false
lto = "thin"
codegen_units = 16

# Testing configuration
[testing]
ubvm_timeout_seconds = 3600
parallel_jobs = "auto"  # Use number of CPU cores
fail_fast = false       # Continue running tests even if one fails
seed = 42               # Deterministic random seed for reproducibility

[testing.test_suites]
language_equivalence = true
networking = true
compression = true
security = true
storage = true
ai_optional = true
hardware = true
resilience = true
formal_verification = true
integration = true

# Verification settings
[verification]
axiom_timeout_seconds = 10
proof_caching = true
continuous_verification = true  # Run proofs on every commit

# Performance targets
[performance]
kernel_boot_time_ms = 500
service_startup_ms = 100
p2p_handshake_ms = 50
compression_throughput_gbps = 10
kernel_memory_bytes = 8388608  # 8 MB max

# Compatibility
[compatibility]
min_kernel_version = "6.0"
wasm_target = "wasm32-wasi"
gpu_targets = ["nvptx64-nvidia-cuda", "amdgpu-amd-amdhsa"]
cpu_targets = ["x86_64-unknown-linux-gnu", "aarch64-unknown-linux-gnu", "x86_64-pc-windows-msvc"]

# Distribution
[distribution]
package_format = "cas"  # Content-addressed storage
signature_algorithm = "ed25519"
compression = "zstd"
retention_days = 90

# Documentation
[docs]
languages = ["Markdown", "AsciiDoc"]
api_docs = true
architecture_docs = true
tutorial_docs = true
auto_generate = true
publish_url = "https://docs.omnisystem.dev"

# Metadata
[metadata]
created = "2026-06-04"
version_target = "1.0.0"
estimated_completion = "2026-12-31"
