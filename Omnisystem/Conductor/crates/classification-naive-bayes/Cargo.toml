[package]
name = "classification-naive-bayes"
version = "0.1.0"
edition = "2021"
description = "Naive Bayes"

[dependencies]
tokio = { version = "1.35", features = ["full"] }
async-trait = "0.1"
dashmap = "5.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
thiserror = "1.0"

[lib]
name = "classification_naive_bayes"
path = "src/lib.rs"

[[bin]]
name = "classification_naive_bayes_cli"
path = "src/bin/cli.rs"
