[package]
name = "pattern-prediction-trends"
version = "0.1.0"
edition = "2021"
description = "Trend prediction"

[dependencies]
tokio = { version = "1.35", features = ["full"] }
async-trait = "0.1"
dashmap = "5.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
thiserror = "1.0"

[lib]
name = "pattern_prediction_trends"
path = "src/lib.rs"

[[bin]]
name = "pattern_prediction_trends_cli"
path = "src/bin/cli.rs"
