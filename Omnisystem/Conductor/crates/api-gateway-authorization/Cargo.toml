[package]
name = "api-gateway-authorization"
version = "0.1.0"
edition = "2021"
description = "Authorization"

[dependencies]
tokio = { version = "1.35", features = ["full"] }
async-trait = "0.1"
dashmap = "5.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
thiserror = "1.0"

[lib]
name = "api_gateway_authorization"
path = "src/lib.rs"

[[bin]]
name = "api_gateway_authorization_cli"
path = "src/bin/cli.rs"
