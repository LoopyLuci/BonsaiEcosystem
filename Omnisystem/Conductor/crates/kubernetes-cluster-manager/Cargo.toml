[package]
name = "kubernetes-cluster-manager"
version = "0.1.0"
edition = "2021"
description = "Cluster management"

[dependencies]
tokio = { version = "1.35", features = ["full"] }
async-trait = "0.1"
dashmap = "5.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
thiserror = "1.0"

[lib]
name = "kubernetes_cluster_manager"
path = "src/lib.rs"

[[bin]]
name = "kubernetes_cluster_manager_cli"
path = "src/bin/cli.rs"
