[package]
name = "sdk-generator-nodejs"
version = "0.1.0"
edition = "2021"
description = "Node.js SDK"

[dependencies]
tokio = { version = "1.35", features = ["full"] }
async-trait = "0.1"
dashmap = "5.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
thiserror = "1.0"

[lib]
name = "sdk_generator_nodejs"
path = "src/lib.rs"

[[bin]]
name = "sdk_generator_nodejs_cli"
path = "src/bin/cli.rs"
