[package]
name = "debate-engine-learning"
version = "0.1.0"
edition = "2021"
description = "Learning from debates"

[dependencies]
tokio = { version = "1.35", features = ["full"] }
async-trait = "0.1"
dashmap = "5.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
thiserror = "1.0"
axum = "0.7"
tower = "0.4"
http = "1.0"

[lib]
name = "debate_engine_learning"
path = "src/lib.rs"

[[bin]]
name = "debate_engine_learning_cli"
path = "src/bin/cli.rs"
