[package]
name = "load-balancing-intelligent"
version = "0.1.0"
edition = "2021"
description = "Intelligent load balancing"

[dependencies]
tokio = { version = "1.35", features = ["full"] }
async-trait = "0.1"
dashmap = "5.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
thiserror = "1.0"
axum = "0.7"
tower = "0.4"
http = "1.0"

[lib]
name = "load_balancing_intelligent"
path = "src/lib.rs"

[[bin]]
name = "load_balancing_intelligent_cli"
path = "src/bin/cli.rs"
