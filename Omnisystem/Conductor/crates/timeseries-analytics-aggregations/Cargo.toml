[package]
name = "timeseries-analytics-aggregations"
version = "0.1.0"
edition = "2021"
description = "Time-windowed agg"

[dependencies]
tokio = { version = "1.35", features = ["full"] }
async-trait = "0.1"
dashmap = "5.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
thiserror = "1.0"

[lib]
name = "timeseries_analytics_aggregations"
path = "src/lib.rs"

[[bin]]
name = "timeseries_analytics_aggregations_cli"
path = "src/bin/cli.rs"
