[package]
name = "incident-response-routing"
version = "0.1.0"
edition = "2021"
description = "Incident routing"

[dependencies]
tokio = { version = "1.35", features = ["full"] }
async-trait = "0.1"
dashmap = "5.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
thiserror = "1.0"

[lib]
name = "incident_response_routing"
path = "src/lib.rs"

[[bin]]
name = "incident_response_routing_cli"
path = "src/bin/cli.rs"
