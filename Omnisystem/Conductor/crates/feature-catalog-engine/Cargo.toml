[package]
name = "feature-catalog-engine"
version = "0.1.0"
edition = "2021"
description = "Complete feature inventory"

[dependencies]
tokio = { version = "1.35", features = ["full"] }
async-trait = "0.1"
dashmap = "5.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
thiserror = "1.0"
axum = "0.7"
tower = "0.4"
http = "1.0"

[lib]
name = "feature_catalog_engine"
path = "src/lib.rs"

[[bin]]
name = "feature_catalog_engine_cli"
path = "src/bin/cli.rs"
