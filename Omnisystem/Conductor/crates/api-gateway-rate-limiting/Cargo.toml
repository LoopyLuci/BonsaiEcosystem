[package]
name = "api-gateway-rate-limiting"
version = "0.1.0"
edition = "2021"
description = "Rate limiting"

[dependencies]
tokio = { version = "1.35", features = ["full"] }
async-trait = "0.1"
dashmap = "5.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
thiserror = "1.0"

[lib]
name = "api_gateway_rate_limiting"
path = "src/lib.rs"

[[bin]]
name = "api_gateway_rate_limiting_cli"
path = "src/bin/cli.rs"
