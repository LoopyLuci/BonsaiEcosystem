[package]
name = "constraint-solver-parallel"
version = "0.1.0"
edition = "2021"
description = "Parallel constraint solving"

[dependencies]
tokio = { version = "1.35", features = ["full"] }
async-trait = "0.1"
dashmap = "5.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
thiserror = "1.0"
axum = "0.7"
tower = "0.4"
http = "1.0"

[lib]
name = "constraint_solver_parallel"
path = "src/lib.rs"

[[bin]]
name = "constraint_solver_parallel_cli"
path = "src/bin/cli.rs"
