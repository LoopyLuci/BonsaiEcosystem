[package]
name = "business-intelligence-impact"
version = "0.1.0"
edition = "2021"
description = "Impact analysis"

[dependencies]
tokio = { version = "1.35", features = ["full"] }
async-trait = "0.1"
dashmap = "5.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
thiserror = "1.0"

[lib]
name = "business_intelligence_impact"
path = "src/lib.rs"

[[bin]]
name = "business_intelligence_impact_cli"
path = "src/bin/cli.rs"
