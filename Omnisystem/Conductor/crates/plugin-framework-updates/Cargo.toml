[package]
name = "plugin-framework-updates"
version = "0.1.0"
edition = "2021"
description = "Updates"

[dependencies]
tokio = { version = "1.35", features = ["full"] }
async-trait = "0.1"
dashmap = "5.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
thiserror = "1.0"

[lib]
name = "plugin_framework_updates"
path = "src/lib.rs"

[[bin]]
name = "plugin_framework_updates_cli"
path = "src/bin/cli.rs"
