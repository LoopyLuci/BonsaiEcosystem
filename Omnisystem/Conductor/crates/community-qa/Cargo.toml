[package]
name = "community-qa"
version = "0.1.0"
edition = "2021"
description = "Q&A system"

[dependencies]
tokio = { version = "1.35", features = ["full"] }
async-trait = "0.1"
dashmap = "5.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
thiserror = "1.0"

[lib]
name = "community_qa"
path = "src/lib.rs"

[[bin]]
name = "community_qa_cli"
path = "src/bin/cli.rs"
