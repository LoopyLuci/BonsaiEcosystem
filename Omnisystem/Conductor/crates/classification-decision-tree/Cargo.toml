[package]
name = "classification-decision-tree"
version = "0.1.0"
edition = "2021"
description = "Decision trees"

[dependencies]
tokio = { version = "1.35", features = ["full"] }
async-trait = "0.1"
dashmap = "5.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
thiserror = "1.0"

[lib]
name = "classification_decision_tree"
path = "src/lib.rs"

[[bin]]
name = "classification_decision_tree_cli"
path = "src/bin/cli.rs"
