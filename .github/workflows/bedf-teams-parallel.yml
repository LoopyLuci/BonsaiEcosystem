name: BEDF Teams Parallel Build & Test

on:
  push:
    branches: [main, develop, 'team/**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Team A: Fuzzing Engine
  team-a-fuzzing:
    name: Team A - Fuzzing Engine
    runs-on: ubuntu-latest-8core
    steps:
      - uses: actions/checkout@v3
      - uses: rust-lang/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates/bonsai-bedf-fuzzing"
      - name: Build
        run: cargo build --package bonsai-bedf-fuzzing --release
      - name: Test
        run: cargo test --package bonsai-bedf-fuzzing --release
      - name: Lint
        run: cargo clippy --package bonsai-bedf-fuzzing -- -D warnings
      - name: Format Check
        run: cargo fmt --package bonsai-bedf-fuzzing -- --check

  # Team B: Concurrency Testing
  team-b-concurrency:
    name: Team B - Concurrency Testing
    runs-on: ubuntu-latest-8core
    steps:
      - uses: actions/checkout@v3
      - uses: rust-lang/rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates/bonsai-bedf-concurrency"
      - name: Build
        run: cargo build --package bonsai-bedf-concurrency --release
      - name: Test
        run: cargo test --package bonsai-bedf-concurrency --release

  # Team C: Sanitizers
  team-c-sanitizers:
    name: Team C - Memory Sanitizers
    runs-on: ubuntu-latest-8core
    steps:
      - uses: actions/checkout@v3
      - uses: rust-lang/rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates/bonsai-bedf-sanitizers"
      - name: Build
        run: cargo build --package bonsai-bedf-sanitizers --release
      - name: Test
        run: cargo test --package bonsai-bedf-sanitizers --release

  # Team D: Property Testing
  team-d-property:
    name: Team D - Property Testing
    runs-on: ubuntu-latest-8core
    steps:
      - uses: actions/checkout@v3
      - uses: rust-lang/rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates/bonsai-bedf-property"
      - name: Build
        run: cargo build --package bonsai-bedf-property --release
      - name: Test
        run: cargo test --package bonsai-bedf-property --release

  # Team E: Penetration Testing
  team-e-pentest:
    name: Team E - Penetration Testing
    runs-on: ubuntu-latest-8core
    steps:
      - uses: actions/checkout@v3
      - uses: rust-lang/rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates/bonsai-bedf-pentest"
      - name: Build
        run: cargo build --package bonsai-bedf-pentest --release
      - name: Test
        run: cargo test --package bonsai-bedf-pentest --release

  # Team F: Sandbox Orchestration
  team-f-sandbox:
    name: Team F - Sandbox Orchestration
    runs-on: ubuntu-latest-8core
    steps:
      - uses: actions/checkout@v3
      - uses: rust-lang/rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates/bonsai-bedf-sandbox"
      - name: Build
        run: cargo build --package bonsai-bedf-sandbox --release
      - name: Test
        run: cargo test --package bonsai-bedf-sandbox --release

  # Team G: Triage Engine
  team-g-triage:
    name: Team G - Triage & AI
    runs-on: ubuntu-latest-8core
    steps:
      - uses: actions/checkout@v3
      - uses: rust-lang/rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates/bonsai-bedf-triage"
      - name: Build
        run: cargo build --package bonsai-bedf-triage --release
      - name: Test
        run: cargo test --package bonsai-bedf-triage --release

  # Team H: MCP Tools
  team-h-mcp:
    name: Team H - MCP Tools
    runs-on: ubuntu-latest-8core
    steps:
      - uses: actions/checkout@v3
      - uses: rust-lang/rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates/bonsai-bedf-mcp"
      - name: Build
        run: cargo build --package bonsai-bedf-mcp --release
      - name: Test
        run: cargo test --package bonsai-bedf-mcp --release

  # Team I: Enhancements
  team-i-enhancements:
    name: Team I - Advanced Enhancements
    runs-on: ubuntu-latest-8core
    steps:
      - uses: actions/checkout@v3
      - uses: rust-lang/rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates/bonsai-bedf-enhancements"
      - name: Build
        run: cargo build --package bonsai-bedf-enhancements --release
      - name: Test
        run: cargo test --package bonsai-bedf-enhancements --release

  # Team J: Survival System
  team-j-survival:
    name: Team J - Survival System
    runs-on: ubuntu-latest-8core
    steps:
      - uses: actions/checkout@v3
      - uses: rust-lang/rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates/bonsai-survival-system-ext"
      - name: Build
        run: cargo build --package bonsai-survival-system-ext --release
      - name: Test
        run: cargo test --package bonsai-survival-system-ext --release

  # Team K: KDB Integration
  team-k-kdb:
    name: Team K - KDB Integration
    runs-on: ubuntu-latest-8core
    steps:
      - uses: actions/checkout@v3
      - uses: rust-lang/rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "crates/bonsai-kdb-ext"
      - name: Build
        run: cargo build --package bonsai-kdb-ext --release
      - name: Test
        run: cargo test --package bonsai-kdb-ext --release

  # Integration Tests (All teams together)
  integration-tests:
    name: Integration Tests (All Teams)
    needs: [team-a-fuzzing, team-b-concurrency, team-c-sanitizers, team-d-property,
            team-e-pentest, team-f-sandbox, team-g-triage, team-h-mcp,
            team-i-enhancements, team-j-survival, team-k-kdb]
    runs-on: ubuntu-latest-8core
    if: always()
    steps:
      - uses: actions/checkout@v3
      - uses: rust-lang/rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - name: Run Integration Tests
        run: cargo test --workspace --release
      - name: Workspace Check
        run: cargo check --workspace --all-targets

  # Status Report
  status-report:
    name: Build Status Report
    needs: [integration-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Report Success
        if: success()
        run: echo "✅ All teams passed their builds and integration tests!"
      - name: Report Failure
        if: failure()
        run: echo "❌ Some teams had build or test failures. Check logs above."
