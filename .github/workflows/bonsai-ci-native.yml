name: Bonsai Native CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *'  # Nightly at 2 AM UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-validation:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install PowerShell
        run: |
          sudo apt-get update
          sudo apt-get install -y powershell

      - name: Run Bonsai CI/CD Orchestrator - PR Validation
        run: |
          pwsh ./scripts/bonsai-ci-orchestrator-complete.ps1 `
            -Workflow pr_validation `
            -Verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

      - name: Update GitHub Status
        if: always()
        run: |
          pwsh ./scripts/bonsai-ci-github-status.ps1 `
            -Owner ${{ github.repository_owner }} `
            -Repo ${{ github.event.repository.name }} `
            -Sha ${{ github.event.pull_request.head.sha }} `
            -Context "bonsai-ci/pr-validation" `
            -State ${{ job.status }} `
            -Description "PR validation ${{ job.status }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload PR Validation Artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: pr-validation-artifacts
          path: artifacts/pr-validation/
          retention-days: 30

      - name: Notify Slack - PR Validation
        if: always()
        run: |
          pwsh ./scripts/bonsai-ci-slack-notify.ps1 `
            -Message "PR #${{ github.event.pull_request.number }} validation ${{ job.status }}" `
            -Channel "#ci-cd-pr" `
            -Severity ${{ job.status == 'success' && 'info' || 'error' }}
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

  nightly-soak:
    if: github.event.schedule == '0 2 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install PowerShell
        run: |
          sudo apt-get update
          sudo apt-get install -y powershell

      - name: Run Bonsai CI/CD Orchestrator - Nightly Soak
        run: |
          pwsh ./scripts/bonsai-ci-orchestrator-complete.ps1 `
            -Workflow nightly_soak `
            -Verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

      - name: Upload Nightly Artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: nightly-soak-artifacts
          path: artifacts/nightly-soak/
          retention-days: 30

      - name: Notify Slack - Nightly
        if: always()
        run: |
          pwsh ./scripts/bonsai-ci-slack-notify.ps1 `
            -Message "Nightly soak test ${{ job.status }}" `
            -Channel "#ci-cd-nightly" `
            -Severity ${{ job.status == 'success' && 'info' || 'error' }}
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

  quick-check:
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install PowerShell
        run: |
          sudo apt-get update
          sudo apt-get install -y powershell

      - name: Run Bonsai CI/CD Orchestrator - Quick Check
        run: |
          pwsh ./scripts/bonsai-ci-orchestrator-complete.ps1 `
            -Workflow quick_check `
            -Verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update GitHub Status
        if: always()
        run: |
          pwsh ./scripts/bonsai-ci-github-status.ps1 `
            -Owner ${{ github.repository_owner }} `
            -Repo ${{ github.event.repository.name }} `
            -Sha ${{ github.sha }} `
            -Context "bonsai-ci/quick-check" `
            -State ${{ job.status }} `
            -Description "Quick check ${{ job.status }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  coverage-report:
    needs: pr-validation
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install PowerShell
        run: |
          sudo apt-get update
          sudo apt-get install -y powershell

      - name: Run Coverage Analysis
        run: |
          pwsh ./scripts/bonsai-ci-orchestrator-complete.ps1 `
            -Workflow coverage `
            -Verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Coverage
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: artifacts/coverage/
          retention-days: 30

      - name: Comment PR with Coverage
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coverage = fs.readFileSync('artifacts/coverage/summary.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: coverage
            });

  stress-test:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install PowerShell
        run: |
          sudo apt-get update
          sudo apt-get install -y powershell

      - name: Run Stress Tests
        run: |
          pwsh ./scripts/bonsai-ci-orchestrator-complete.ps1 `
            -Workflow stress_test `
            -Verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Stress Test Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: stress-test-results
          path: artifacts/stress-tests/
          retention-days: 30

  benchmark:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install PowerShell
        run: |
          sudo apt-get update
          sudo apt-get install -y powershell

      - name: Run Benchmarks
        run: |
          pwsh ./scripts/bonsai-ci-orchestrator-complete.ps1 `
            -Workflow benchmark `
            -Verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Benchmark Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: benchmark-results
          path: artifacts/benchmarks/
          retention-days: 30

      - name: Comment with Benchmark Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const benchmarks = fs.readFileSync('artifacts/benchmarks/summary.md', 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '## Benchmark Results\n' + benchmarks
              });
            } catch (e) {
              console.log('No benchmark results available');
            }

  notify-completion:
    needs: [pr-validation]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Completion
        run: |
          echo "CI/CD pipeline completed"
          echo "PR Validation: ${{ needs.pr-validation.result }}"
