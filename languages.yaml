# languages.yaml – 500+ Languages for Bonsai Polyglot Ecosystem
# Complete language configuration for universal polyglot support

languages:
  # ======================== Standard / Mainstream Languages ========================
  - name: C
    extensions: ["c", "h"]
    parser: "clang -Xclang -ast-dump=json -fsyntax-only"
  - name: "C++"
    extensions: ["cpp", "cxx", "cc", "hpp"]
    parser: "clang++ -Xclang -ast-dump=json -fsyntax-only"
  - name: Rust
    extensions: ["rs"]
    parser: "rustc -Z unstable-options --pretty=expanded"
  - name: Go
    extensions: ["go"]
    parser: "go build -gcflags=-m"
  - name: Zig
    extensions: ["zig"]
    parser: "zig ast-check"
  - name: Nim
    extensions: ["nim"]
    parser: "nim check --verbosity:0"
  - name: Swift
    extensions: ["swift"]
    parser: "swiftc -dump-ast"
  - name: "Objective-C"
    extensions: ["m"]
    parser: "clang -x objective-c"
  - name: D
    extensions: ["d"]
    parser: "dmd -X"
  - name: Haskell
    extensions: ["hs"]
    parser: "ghc -ddump-parsed-ast"
  - name: OCaml
    extensions: ["ml"]
    parser: "ocamlc -dparsetree"
  - name: "F#"
    extensions: ["fs", "fsx"]
    parser: "fsc --ast"
  - name: Erlang
    extensions: ["erl"]
    parser: "erlc -E"
  - name: Elixir
    extensions: ["ex", "exs"]
    parser: "elixirc"
  - name: Clojure
    extensions: ["clj", "cljs"]
    parser: "clj"
  - name: Java
    extensions: ["java"]
    parser: "javac -Xprint"
  - name: Kotlin
    extensions: ["kt", "kts"]
    parser: "kotlinc -Xprint-ast"
  - name: Scala
    extensions: ["scala"]
    parser: "scalac -Xprint:parser"
  - name: Groovy
    extensions: ["groovy", "gvy"]
    parser: "groovy -a"
  - name: "C#"
    extensions: ["cs", "csx"]
    parser: "csc"
  - name: "VB.NET"
    extensions: ["vb"]
    parser: "vbc"
  - name: Python
    extensions: ["py", "pyw"]
    parser: "python -m ast"
  - name: Ruby
    extensions: ["rb", "rbw"]
    parser: "ruby -c"
  - name: Perl
    extensions: ["pl", "pm"]
    parser: "perl -c"
  - name: PHP
    extensions: ["php"]
    parser: "php -l"
  - name: JavaScript
    extensions: ["js", "mjs"]
    parser: "node --check"
  - name: TypeScript
    extensions: ["ts", "tsx"]
    parser: "tsc --noEmit"
