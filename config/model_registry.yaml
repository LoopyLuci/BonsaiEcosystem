# BonsAI Model Registry — Windows/AMD 7900 XTX
#
# Catalogue every GGUF on this machine with its role and domain strengths.
# The training pipeline uses this file to:
#   - Pick the best teacher for each training domain
#   - Decide which model to hot-reload into bonsai-latest.gguf after training
#   - Route ensemble distillation: code prompts → code specialist, etc.
#
# Fields:
#   name        : human-readable label used in logs and UI
#   path        : absolute path to the GGUF (~ is expanded to %USERPROFILE%)
#   role        : student | teacher | teacher_code | teacher_reason | critic | specialist
#   vram_gb     : approximate VRAM required at Q4_K_M (for scheduling)
#   domains     : list of domains this model excels at (for ensemble routing)
#   context_len : max context window in tokens
#   quantisation: GGUF quantisation level (informational)

models:

  # ── Active student (the model BonsAI runs) ────────────────────────────────────
  - name: "Bonsai-1.7B-active"
    path: "~/.bonsai/models/bonsai-latest.gguf"
    role: student
    vram_gb: 3
    domains: [general, coding, tool_use, system_repair]
    context_len: 32768
    quantisation: Q4_K_M
    hot_reload_target: true   # this is the file hot_reload.rs watches

  # ── General teachers (knowledge distillation) ─────────────────────────────────
  - name: "Qwen3-35B"
    path: "D:/Models/general/Qwen3-35B-A22B-Q4_K_M.gguf"
    role: teacher
    vram_gb: 22
    domains: [general, creative, tool_use, planning]
    context_len: 32768
    quantisation: Q4_K_M

  - name: "Qwen2.5-14B"
    path: "D:/Models/general/Qwen2.5-14B-Instruct-Q4_K_M.gguf"
    role: teacher
    vram_gb: 9
    domains: [general, creative, coding]
    context_len: 32768
    quantisation: Q4_K_M

  # ── Code-specialist teachers ──────────────────────────────────────────────────
  - name: "DeepSeek-R1-32B"
    path: "D:/Models/coding/DeepSeek-R1-Distill-Qwen-32B-Q4_K_M.gguf"
    role: teacher_code
    vram_gb: 20
    domains: [coding, reasoning, system_repair]
    context_len: 32768
    quantisation: Q4_K_M

  - name: "Qwen2.5-Coder-7B"
    path: "D:/Models/coding/Qwen2.5-Coder-7B-Instruct-Q4_K_M.gguf"
    role: teacher_code
    vram_gb: 5
    domains: [coding, tool_use]
    context_len: 32768
    quantisation: Q4_K_M

  # ── Reasoning teachers ────────────────────────────────────────────────────────
  - name: "DeepSeek-R1-14B"
    path: "D:/Models/reasoning/DeepSeek-R1-Distill-Qwen-14B-Q4_K_M.gguf"
    role: teacher_reason
    vram_gb: 9
    domains: [reasoning, planning, coding]
    context_len: 32768
    quantisation: Q4_K_M

  # ── Critics (quality scoring, constitutional AI) ──────────────────────────────
  - name: "Bonsai-0.5B-critic"
    path: "~/.bonsai/models/Bonsai-0.5B.gguf"
    role: critic
    vram_gb: 1
    domains: [general]
    context_len: 4096
    quantisation: Q4_K_M

# ── Ensemble routing table ─────────────────────────────────────────────────────
# Maps training domain → preferred teacher model name.
# Falls back to the first teacher if a domain has no match.
ensemble_routing:
  coding:        "DeepSeek-R1-32B"
  system_repair: "DeepSeek-R1-32B"
  reasoning:     "DeepSeek-R1-14B"
  tool_use:      "Qwen3-35B"
  planning:      "Qwen3-35B"
  creative:      "Qwen2.5-14B"
  general:       "Qwen3-35B"
