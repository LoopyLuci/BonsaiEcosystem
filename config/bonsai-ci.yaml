# Bonsai Custom CI/CD System Configuration
# Replaces GitHub Actions with native Bonsai orchestration

version: "1.0"
name: "Bonsai BEDF CI/CD Pipeline"
description: "Native Bonsai CI/CD using BEDF orchestrator"

# Global settings
global:
  parallel_jobs: 8
  timeout_secs: 3600
  retry_on_failure: true
  max_retries: 2
  log_level: "info"

# Pipeline stages
stages:
  - name: "Build"
    description: "Compile all crates"
    parallel: true

  - name: "Test"
    description: "Run unit and integration tests"
    parallel: true

  - name: "Lint"
    description: "Code quality checks"
    parallel: true

  - name: "Integration"
    description: "Cross-team integration tests"
    parallel: false

# Teams and their jobs
teams:
  - id: "A"
    name: "Fuzzing Engine"
    crate: "bonsai-bedf-fuzzing"
    owner: "Team A Lead"
    stages: ["Build", "Test", "Lint"]

  - id: "B"
    name: "Concurrency Testing"
    crate: "bonsai-bedf-concurrency"
    owner: "Team B Lead"
    stages: ["Build", "Test", "Lint"]

  - id: "C"
    name: "Memory Sanitizers"
    crate: "bonsai-bedf-sanitizers"
    owner: "Team C Lead"
    stages: ["Build", "Test", "Lint"]

  - id: "D"
    name: "Property Testing"
    crate: "bonsai-bedf-property"
    owner: "Team D Lead"
    stages: ["Build", "Test", "Lint"]

  - id: "E"
    name: "Penetration Testing"
    crate: "bonsai-bedf-pentest"
    owner: "Team E Lead"
    stages: ["Build", "Test", "Lint"]

  - id: "F"
    name: "Sandbox Orchestration"
    crate: "bonsai-bedf-sandbox"
    owner: "Team F Lead"
    stages: ["Build", "Test", "Lint"]

  - id: "G"
    name: "Triage & AI"
    crate: "bonsai-bedf-triage"
    owner: "Team G Lead"
    stages: ["Build", "Test", "Lint"]

  - id: "H"
    name: "MCP Tools"
    crate: "bonsai-bedf-mcp"
    owner: "Team H Lead"
    stages: ["Build", "Test", "Lint"]

  - id: "I"
    name: "Advanced Enhancements"
    crate: "bonsai-bedf-enhancements"
    owner: "Team I Lead"
    stages: ["Build", "Test", "Lint"]

  - id: "J"
    name: "Survival System"
    crate: "bonsai-survival-system-ext"
    owner: "Team J Lead"
    stages: ["Build", "Test", "Lint"]

  - id: "K"
    name: "Knowledge Database"
    crate: "bonsai-kdb-ext"
    owner: "Team K Lead"
    stages: ["Build", "Test", "Lint"]

# Build commands
build:
  command: "cargo build --package {crate} --release"
  timeout: 600

# Test commands
test:
  unit:
    command: "cargo test --package {crate} --release"
    timeout: 300
  integration:
    command: "cargo test --workspace --release"
    timeout: 600

# Lint commands
lint:
  clippy:
    command: "cargo clippy --package {crate} -- -D warnings"
    timeout: 300
  format:
    command: "cargo fmt --package {crate} -- --check"
    timeout: 60

# Notifications
notifications:
  slack:
    enabled: false
  email:
    enabled: false
  bonsai_dashboard:
    enabled: true

# Artifacts
artifacts:
  - path: "target/release/*.rlib"
  - path: "target/release/*.so"
  - path: "coverage/"

# Cache settings
cache:
  enabled: true
  paths:
    - "target/release"
    - ".cargo"

# Triggers
triggers:
  - event: "push"
    branches: ["main", "develop"]
    action: "run_pipeline"
  - event: "pull_request"
    branches: ["main"]
    action: "run_pipeline"
  - event: "schedule"
    cron: "0 2 * * *"
    action: "run_full_test"

# Success criteria
success_criteria:
  all_teams_passed: true
  no_clippy_warnings: true
  code_formatted: true
  integration_tests_passed: true
  coverage_threshold: 0.80
