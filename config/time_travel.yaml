time_travel:
  enabled: true
  max_storage_gb: 100

  snapshot:
    interval_minutes: 5
    max_snapshots: 1000
    auto_label: true
    pre_training: true
    pre_upgrade: true
    pre_swarm_task: true

  retention:
    file_changes_days: 30
    agent_actions_days: 7
    model_versions_keep: all
    survival_events_days: 90
    collaboration_events_hours: 24
    compute_events_days: 30
    credit_ledger_keep: all
    snapshots_keep_last_n: 100

  pruning:
    policy: oldest_first
    check_interval_hours: 1
    safety_margin_gb: 5
