---
apiVersion: v1
kind: Namespace
metadata:
  name: bonsai
  labels:
    app: bonsai

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bonsai-core
  namespace: bonsai
  labels:
    app: bonsai
    component: core
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: bonsai
      component: core
  template:
    metadata:
      labels:
        app: bonsai
        component: core
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: bonsai-core
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
      - name: bonsai-core
        image: bonsai/bonsai-core:latest
        imagePullPolicy: Always
        ports:
        - name: api
          containerPort: 8080
          protocol: TCP
        - name: metrics
          containerPort: 8081
          protocol: TCP
        - name: health
          containerPort: 8082
          protocol: TCP

        env:
        - name: RUST_LOG
          value: "info"
        - name: BONSAI_ENV
          value: "production"
        - name: BONSAI_LOG_FORMAT
          value: "json"
        - name: BONSAI_METRICS_ENABLED
          value: "true"
        - name: BONSAI_TRACING_ENABLED
          value: "true"

        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"

        livenessProbe:
          httpGet:
            path: /health/live
            port: health
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health/ready
            port: health
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2

        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL

        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: cache
          mountPath: /var/cache/bonsai

      volumes:
      - name: tmp
        emptyDir: {}
      - name: cache
        emptyDir: {}

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - bonsai
              topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: bonsai-core
  namespace: bonsai
  labels:
    app: bonsai
    component: core
spec:
  type: ClusterIP
  selector:
    app: bonsai
    component: core
  ports:
  - name: api
    port: 80
    targetPort: api
    protocol: TCP
  - name: metrics
    port: 8081
    targetPort: metrics
    protocol: TCP
  - name: health
    port: 8082
    targetPort: health
    protocol: TCP

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: bonsai-core
  namespace: bonsai
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: bonsai
      component: core

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bonsai-core
  namespace: bonsai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bonsai-core
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 4
        periodSeconds: 30
      selectPolicy: Max

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bonsai-core
  namespace: bonsai

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bonsai-core
rules:
- apiGroups: [""]
  resources: ["services", "endpoints"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bonsai-core
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: bonsai-core
subjects:
- kind: ServiceAccount
  name: bonsai-core
  namespace: bonsai
