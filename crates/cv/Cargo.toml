[package]
name = "cv"
version = "5.0.0"
edition = "2021"
description = "OpenCV 5 Rust bindings and safe wrappers - phase 2 of omnisystem integration"

[dependencies]
tokio = { workspace = true, features = ["full"] }
rayon = "1.7"
anyhow = "1"
thiserror = "1"
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
blake3 = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }

[dev-dependencies]
criterion = "0.5"
tempfile = "3"
