[package]
name = "ci"
version = "0.1.0"
edition = "2021"

[lib]
name = "bonsai_ci"
path = "src/lib.rs"

[dependencies]
tokio = { version = "1", features = ["process", "rt-multi-thread", "macros", "sync"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1"
anyhow = "1"
blake3 = "1"
log = "0.4"

# local workspace crates (keep as path deps so the workspace links cleanly)
capability-registry = { path = "../capability-registry" }
actors = { path = "../actors" }
cas = { path = "../cas" }
p2p-crypto = { path = "../p2p-crypto" }
p2p-identity = { path = "../p2p-identity" }
hex = "0.4"
walkdir = "2"
