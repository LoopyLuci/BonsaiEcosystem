[package]
name = "bonsai-fabric"
version = "0.1.0"
edition = "2021"
description = "Bonsai Compute Fabric — distributed task orchestration across personal devices"

[dependencies]
error-types = { path = "../error-types" }
p2p-core = { path = "../p2p-core" }
tokio = { version = "1", features = ["rt-multi-thread", "sync", "time"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
tracing = "0.1"
