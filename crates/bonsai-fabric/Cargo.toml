[package]
name = "bonsai-fabric"
version = "0.1.0"
edition = "2021"
description = "Bonsai Compute Fabric — distributed task orchestration across personal devices"

[dependencies]
bonsai-error = { path = "../bonsai-error" }
bonsai-transfer-core = { path = "../bonsai-transfer-core" }
tokio = { version = "1", features = ["rt-multi-thread", "sync", "time"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
tracing = "0.1"
