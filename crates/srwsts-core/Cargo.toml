[package]
name = "srwsts-core"
version = "0.1.0"
edition = "2021"
authors = ["Bonsai Team <team@bonsai.sh>"]
license = "Apache-2.0"
description = "SRWSTS Core Infrastructure - Types, Traits, and Error Handling"
repository = "https://github.com/bonsai/bonsai-bedf"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
thiserror = "1"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1"
futures = "0.3"
dashmap = "5"
async-trait = "0.1"

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3"
