[package]
name = "hde-orchestrator"
version = "1.0.0"
edition = "2021"
license = "Apache-2.0"
description = "Phase 6: HDE AI Advisor Orchestrator"

[dependencies]
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
log = "0.4"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
