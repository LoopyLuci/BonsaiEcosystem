[package]
name = "sandbox"
version = "0.1.0"
edition = "2021"
authors = ["Bonsai Team"]
license = "Apache-2.0"

[lib]
name = "bonsai_enclave"
path = "src/lib.rs"

[[bin]]
name = "enclave"
path = "src/bin/main.rs"

[[bin]]
name = "orchestrator"
path = "src/bin/orchestrator.rs"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
blake3 = "1.5"
anyhow = "1"
thiserror = "1"
toml = "0.8"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
clap = { version = "4", features = ["derive"] }
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
futures = "0.3"
dashmap = "5"
reqwest = { version = "0.11", features = ["stream"] }
sha2 = "0.10"
hex = "0.4"
tempfile = "3"
walkdir = "2"
dirs = "5"
xz2 = "0.1"
tar = "0.4"

# Bonsai integration (when available)
# ai-advisor = { path = "../ai-advisor" }
# transfer = { path = "../p2p-core" }
# sanctum = { path = "../sanctum" }

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3"
