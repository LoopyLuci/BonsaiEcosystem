[package]
name = "bonsai-backend"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1"
thiserror = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["sync", "rt"] }
log = "0.4"
sysinfo = "0.30"
blake3 = "1"
ndarray = "0.15"
rayon = "1"
dashmap = "5"
lazy_static = "1"
env_logger = "0.11"

[target.'cfg(target_os = "windows")'.dependencies]
winapi = { version = "0.3", features = ["ntdef"], optional = true }

[features]
default = []
cuda = []
rocm = []
directml = ["winapi"]
all-backends = ["cuda", "rocm", "directml"]

[[example]]
name = "detect_hardware"
path = "examples/detect_hardware.rs"
