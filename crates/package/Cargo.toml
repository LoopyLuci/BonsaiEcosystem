[package]
name = "package"
version = "0.1.0"
edition = "2024"
description = "BonsAI Knowledge Package (.bkp) — portable container for base models + knowledge modules"

[dependencies]
kdb = { path = "../kdb" }
serde        = { version = "1.0", features = ["derive"] }
serde_json   = "1.0"
thiserror    = "1"
blake3       = "1"
hex          = "0.4"
zip          = { version = "2", features = ["deflate"] }
zstd         = "0.13"
uuid         = { version = "1", features = ["v4", "serde"] }
chrono       = { version = "0.4", features = ["serde"] }

[dev-dependencies]
tempfile = "3"
