[package]
name = "bonsai-marketplace"
version = "0.1.0"
edition = "2021"

[dependencies]
libp2p = { version = "0.53", features = ["kad", "mdns", "noise", "yamux", "tcp", "dns", "macros"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
ed25519-dalek = "2"
sha2 = "0.10"
reqwest = { version = "0.12", features = ["json"] }
uuid = { version = "1", features = ["v4"] }
