[package]
name = "clojurescript-compiler"
version = "1.0.0"
edition = "2021"
authors = ["Omnisystem Architecture Team"]
license = "Apache-2.0"
description = "Wave 2, Phase 3: ClojureScript compiler backend"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
thiserror = "1.0"
log = "0.4"
env_logger = "0.11"
uuid = { version = "1.0", features = ["v4", "serde"] }

[dev-dependencies]
proptest = "1.0"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
