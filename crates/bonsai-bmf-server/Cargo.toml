[package]
name = "bonsai-bmf-server"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "bmf-server"
path = "src/main.rs"

[dependencies]
anyhow = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = "0.3"
bonsai-bmf-core = { path = "../bonsai-bmf-core" }
bonsai-bmf-smtp = { path = "../bonsai-bmf-smtp" }
bonsai-bmf-imap = { path = "../bonsai-bmf-imap" }
