[package]
name    = "p2p-crypto"
version = "2.0.0"
edition = "2021"
description = "Post-quantum hybrid cryptography for TransferDaemon v2"

[dependencies]
# Classical cryptography
x25519-dalek   = { version = "2", features = ["static_secrets"] }
ed25519-dalek  = { version = "2", features = ["rand_core"] }
aes-gcm        = "0.10"
blake3         = "1"
argon2         = "0.5"
rand           = "0.8"
rand_core      = "0.6"
zeroize        = { version = "1", features = ["derive"] }

# BIP-39 recovery phrases
bip39          = "2"

# Serialization
serde          = { version = "1", features = ["derive"] }
serde_json     = "1"
thiserror      = "1"
hex            = "0.4"
chrono         = { version = "0.4", features = ["serde"] }

# Capability system
bitflags       = "2"

# Post-quantum (future: ml-kem, sphincsplus when available)

[dev-dependencies]
tokio          = { version = "1", features = ["full"] }
