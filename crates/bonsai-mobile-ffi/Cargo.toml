[package]
name = "bonsai-mobile-ffi"
version = "0.1.0"
edition = "2021"
description = "Production-grade Rust FFI crate for Android hardware-accelerated video decoding via MediaCodec"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# JNI bindings for Android
jni = "0.21"
jni-sys = "0.3"

# Error handling and logging
thiserror = "1"
anyhow = "1"
log = "0.4"
tracing = "0.1"

# Async runtime
tokio = { version = "1", features = ["sync", "time", "rt"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Time and metrics
chrono = { version = "0.4", features = ["serde"] }

# Utilities
once_cell = "1"
parking_lot = "0.12"
bytes = "1"
uuid = { version = "1", features = ["v4", "serde"] }
lazy_static = "1.4"

# FFI helpers
libc = "0.2"

[target.'cfg(target_os = "android")'.dependencies]
android_logger = "0.14"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
mockall = "0.12"
tokio = { version = "1", features = ["full"] }

[[bench]]
name = "decode_latency"
harness = false

[[bench]]
name = "throughput"
harness = false

[features]
default = ["h264", "h265"]
h264 = []
h265 = []
low-latency = []

[profile.release]
opt-level = 3
lto = true
codegen-units = 1

