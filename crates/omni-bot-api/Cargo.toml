[package]
name = "omni-bot-api"
version = "0.1.0"
edition = "2021"
authors = ["Omnisystem Team"]
license = "Apache-2.0"
description = "Omni-Bot REST/WebSocket API layer"

[dependencies]
omni-bot-core = { path = "../omni-bot-core" }
tokio = { version = "1.0", features = ["full"] }
tokio-tungstenite = "0.21"
axum = { version = "0.7", features = ["macros"] }
axum-extra = { version = "0.8", features = ["typed-routing"] }
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "trace"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
futures = "0.3"
async-trait = "0.1"
log = "0.4"
thiserror = "1.0"
blake3 = "1.0"
validator = { version = "0.16", features = ["derive"] }
regex = "1.10"
lazy_static = "1.4"
dashmap = "5.5"

[profile.release]
opt-level = 3
lto = true
