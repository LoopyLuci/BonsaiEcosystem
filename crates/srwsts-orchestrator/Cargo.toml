[package]
name = "srwsts-orchestrator"
version = "0.1.0"
edition = "2021"
authors = ["Bonsai Team <team@bonsai.sh>"]
license = "Apache-2.0"
description = "SRWSTS Orchestrator - Test execution and coordination"
repository = "https://github.com/bonsai/bonsai-bedf"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1"
futures = "0.3"
dashmap = "5"
async-trait = "0.1"
priority-queue = "1"
metrics = "0.20"
arc-swap = "1"
rand = "0.8"
sha2 = "0.10"
hex = "0.4"

# SRWSTS components
srwsts-core = { path = "../srwsts-core" }
srwsts-schemas = { path = "../srwsts-schemas" }

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3"
