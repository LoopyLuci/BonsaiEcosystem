[package]
name = "bonsai-buddy-backend"
version = "0.1.0"
edition = "2021"
authors = ["Bonsai Team <team@bonsai.sh>"]
license = "Apache-2.0"
description = "Tauri backend for Bonsai Buddy with IPC, API client, state management, and offline-first sync"

[dependencies]
# Core async runtime
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Omni-Bot integration
omni-bot-core = { path = "../omni-bot-core" }

# Cryptography & hashing
blake3 = "1"

# Error handling
thiserror = "1"
anyhow = "1"

# Logging
log = "0.4"
tracing = "0.1"
tracing-subscriber = "0.3"

# Time handling
chrono = { version = "0.4", features = ["serde"] }

# UUIDs
uuid = { version = "1", features = ["v4", "serde"] }

# HTTP client
reqwest = { version = "0.11", features = ["json", "cookies"] }

# WebSocket support
tokio-tungstenite = "0.20"
tungstenite = "0.20"
futures = "0.3"

# State management
dashmap = "5"
parking_lot = "0.12"

# Random
rand = "0.8"

# Platform abstraction
once_cell = "1"

[dev-dependencies]
tokio-test = "0.4"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 16
panic = "abort"
strip = false
split-debuginfo = "packed"

[profile.dev]
opt-level = 0
debug = 1
incremental = true
split-debuginfo = "packed"
