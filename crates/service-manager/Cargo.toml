[package]
name = "service-manager"
version = "1.0.0"
edition = "2021"
authors = ["Omnisystem Architecture Team"]
license = "Apache-2.0"
description = "Service Lifecycle Manager (SLM) – demand-activated, snapshotable background services"

[dependencies]
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
log = "0.4"
env_logger = "0.11"
tracing = "0.1"
tracing-subscriber = "0.3"
blake3 = "1.0"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
dashmap = "5.0"
async-trait = "0.1"
anyhow = "1.0"
futures = "0.3"

[dev-dependencies]
tempfile = "3.8"
mockall = "0.12"

[[bin]]
name = "slm-debug"
path = "src/bin/debug.rs"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
