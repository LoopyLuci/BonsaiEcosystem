[package]
name = "bonsai-udc"
version = "0.1.0"
edition = "2021"
authors = ["Bonsai Team <team@bonsai.sh>"]
license = "Apache-2.0"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
anyhow = "1"
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", features = ["serde"] }
hex = "0.4"

[[bin]]
name = "udc"
path = "src/bin/udc.rs"

[[example]]
name = "full_conversion"
path = "examples/full_conversion.rs"
