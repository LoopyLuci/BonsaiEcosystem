[package]
name = "transfer-ai"
version = "2.0.0"
edition = "2021"
description = "Optional AI enhancements for TransferDaemon v2 – advisory only, safety-clamped, feature-gated"

[dependencies]
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["sync"] }
tracing = "0.1"

# Note: BonsAI V2 integration would go here when available
# ai-core = { path = "../../ai-core" }

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
