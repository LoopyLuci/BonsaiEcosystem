# Test Specification: JSON Parsing and Extraction
# Validates that JSON parsing and key extraction work identically across languages

name = "JSONParsing"
description = "Tests that JSON parsing and field extraction return the same result across languages"
subsystems = ["language", "json-processing"]
reference_lang = "rust"

canonical_source = """
fn extract_name(json_str: &str) -> String {
    if let Ok(value) = serde_json::from_str::<serde_json::Value>(json_str) {
        value.get("name")
            .and_then(|v| v.as_str())
            .unwrap_or("unknown")
            .to_string()
    } else {
        "error".to_string()
    }
}
"""

languages = ["rust", "python", "javascript"]

[[test_cases]]
name = "extract_simple_name"
input = """{"name": "Alice", "age": 30}"""
expected = "Alice"
seed = 200

[[test_cases]]
name = "extract_missing_field"
input = """{"age": 25}"""
expected = "unknown"
seed = 201

[[test_cases]]
name = "extract_nested"
input = """{"person": {"name": "Bob"}}"""
expected = "error"
seed = 202

fidelity_threshold = 0.99
timeout_secs = 30

[runners]
rust = "cargo run --manifest-path {src} {input}"
python = "python3 {src} {input}"
javascript = "node {src} {input}"
