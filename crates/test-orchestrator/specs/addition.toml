# Test Specification: Simple Addition
# Validates that addition produces identical results across languages

name = "SimpleAddition"
description = "Tests that integer addition returns the same result across all languages"
subsystems = ["language"]
reference_lang = "rust"
canonical_source = "fn add(a: i32, b: i32) -> i32 { a + b }"

# Languages to test
languages = ["rust", "python", "javascript"]

# Test cases with deterministic inputs
[[test_cases]]
name = "add_positive_numbers"
input = "2 3"
expected = "5"
seed = 42

[[test_cases]]
name = "add_negative_numbers"
input = "-10 -5"
expected = "-15"
seed = 43

[[test_cases]]
name = "add_zero"
input = "0 0"
expected = "0"
seed = 44

[[test_cases]]
name = "add_large_numbers"
input = "1000000 2000000"
expected = "3000000"
seed = 45

# Fidelity threshold (default 0.99)
fidelity_threshold = 0.99

# Timeout per test in seconds
timeout_secs = 30

# Optional: Runner templates (use defaults if not specified)
[runners]
rust = "cargo run --manifest-path {src} {input}"
python = "python3 {src} {input}"
javascript = "node {src} {input}"
