[package]
name = "bonsai-buddy-offline-sync"
version = "1.0.0"
edition = "2021"
authors = ["Omnisystem Architecture Team"]
license = "Apache-2.0"
description = "Wave 4, Component 2: Offline sync framework for Bonsai Buddy"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
thiserror = "1.0"

[profile.release]
opt-level = 3
lto = true
