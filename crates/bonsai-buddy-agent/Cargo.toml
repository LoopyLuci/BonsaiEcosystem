[package]
name = "bonsai-buddy-agent"
version = "1.0.0"
edition = "2021"
authors = ["Omnisystem Architecture Team"]
license = "Apache-2.0"
description = "Wave 4, Component 1: Standalone Bonsai Buddy agent with offline capabilities"

[dependencies]
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
uuid = { version = "1.0", features = ["v4"] }
log = "0.4"

[profile.release]
opt-level = 3
lto = true
