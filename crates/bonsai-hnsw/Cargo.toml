[package]
name = "bonsai-hnsw"
version = "0.1.0"
edition = "2024"
description = "Pure-Rust HNSW approximate nearest neighbor index for the BonsAI Knowledge Database"

[dependencies]
serde      = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror  = "1"
rand       = "0.8"

[dev-dependencies]
tempfile = "3"
