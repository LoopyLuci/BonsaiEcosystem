[package]
name = "icds"
version = "0.1.0"
edition = "2021"
description = "Infinite Context Database System - provides AI agents with unbounded, associative memory"

[dependencies]
# Core async runtime
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bincode = "1"

# Data structures
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# Vector search & indexing
hnswlib = "0.3"  # or equivalent HNSW implementation
ndarray = "0.15"  # for vector operations
ndarray-linalg = "0.15"

# Text processing
tantivy = "0.21"  # full-text search
unicode-segmentation = "1"  # for chunking

# Compression
zstd = "0.13"
# buce = { path = "../compression", optional = true }  # NOT AVAILABLE

# Content addressing & CAS
blake3 = "1"
# cas = { path = "../cas", optional = true }  # COMMENTED OUT - use workspace dep instead

# Distributed coordination
# echo = { path = "../discovery", optional = true }  # NOT AVAILABLE
# transfer-daemon = { path = "../p2p-core", optional = true }  # Use p2p-core directly

# Database for metadata
# aridb = { path = "../aridb", optional = true }  # NOT AVAILABLE

# AI-optional fallback
# ai-advisor = { path = "../ai-advisor", optional = true }  # Use workspace dep if needed

# Logging & observability
tracing = "0.1"
tracing-subscriber = "0.3"

# Error handling
anyhow = "1"
thiserror = "1"

# Utilities
parking_lot = "0.12"  # for efficient locking
dashmap = "5"  # concurrent hashmap
futures = "0.3"
lazy_static = "1"

[dev-dependencies]
tokio-test = "0.4"
criterion = "0.5"

[features]
default = ["deterministic-core"]
deterministic-core = []
# ai-enhancements = ["ai-advisor"]  # DISABLED - dependency not available
# distributed = ["echo", "transfer-daemon"]  # DISABLED - dependencies not available
# cas-integration = ["cas"]  # DISABLED - dependency not available
# compression-integration = ["buce"]  # DISABLED - dependency not available
# metadata-db = ["aridb"]  # DISABLED - dependency not available
# all-features = ["ai-enhancements", "distributed", "cas-integration", "compression-integration", "metadata-db"]  # DISABLED

[[bench]]
name = "retrieval_benchmarks"
harness = false

[lib]
name = "bonsai_icds"
path = "src/lib.rs"
