[package]
name = "kernel-snapshot"
version = "1.0.0"
edition = "2021"
authors = ["Omnisystem Architecture Team"]
license = "Apache-2.0"
description = "Phase 1: Real kernel snapshot_vault and restore_vault syscalls (UOSC extension)"

[dependencies]
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
log = "0.4"
env_logger = "0.11"
blake3 = "1.0"
nix = { version = "0.27", features = ["mman", "process"] }
libc = "0.2"
once_cell = "1.19"

[dev-dependencies]
tempfile = "3.8"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
