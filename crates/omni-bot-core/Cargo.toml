[package]
name = "omni-bot-core"
version = "0.1.0"
edition = "2021"
authors = ["Omnisystem Team"]
license = "Apache-2.0"
description = "Core types, traits, and infrastructure for Omni-Bot"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
thiserror = "1.0"
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
async-trait = "0.1"
blake3 = "1.0"
log = "0.4"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
