[package]
name = "omnisystem-examples"
version = "1.0.0"
edition = "2021"
authors = ["Omnisystem Architecture Team"]
license = "Apache-2.0"
description = "Examples demonstrating Omnisystem architecture usage patterns"

[dependencies]
titan-core = { path = "../titan-core" }
buddy-agent = { path = "../buddy-agent" }
hde-runtime = { path = "../hde-runtime" }
hde-ai-advisor = { path = "../hde-ai-advisor" }
model-builder = { path = "../model-builder" }
axiom-verify = { path = "../axiom-verify" }
bonsai-buddy-crdt = { path = "../bonsai-buddy-crdt" }
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
