[package]
name = "omnisystem-config"
version = "1.0.0"
edition = "2021"
authors = ["Omnisystem Architecture Team"]
license = "Apache-2.0"
description = "Configuration and builder framework for Omnisystem deployments"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
thiserror = "1.0"

[profile.release]
opt-level = 3
lto = true
