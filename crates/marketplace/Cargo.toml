[package]
name = "marketplace"
version = "0.1.0"
edition = "2021"

[dependencies]
credits = { path = "../credits" }
error-types = { path = "../error-types" }
tokio = { version = "1", features = ["rt", "sync", "time", "macros"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4", "serde"] }
tracing = "0.1"
chrono = { version = "0.4", features = ["serde"] }
