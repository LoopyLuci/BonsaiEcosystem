[package]
name = "bonsai-sns"
version = "0.1.0"
edition = "2021"
description = "Sandbox Nervous System — zero-trust capability-based isolation for every Bonsai process"

[dependencies]
tokio    = { version = "1", features = ["full"] }
serde    = { version = "1", features = ["derive"] }
serde_json = "1"
blake3   = "1"
chrono   = { version = "0.4", features = ["serde"] }
uuid     = { version = "1", features = ["v4", "serde"] }
thiserror = "1"
tracing  = "0.1"
dashmap  = "5"
