[package]
name = "bonsai-etl"
version = "0.1.0"
edition = "2021"
description = "Bonsai EternalTrainingLoop - Continuous learning from user feedback"

[dependencies]
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.6", features = ["v4", "serde"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
async-trait = "0.1"
dashmap = "5.5"
parking_lot = "0.12"

# Data storage
sqlx = { version = "0.7", features = ["runtime-tokio-rustls", "sqlite"] }
bincode = "1.3"

# Math
ndarray = "0.15"
statrs = "0.16"

# Integration
bonsai-error = { path = "../bonsai-error" }
bonsai-lint = { path = "../bonsai-lint", optional = true }

[dev-dependencies]
tempfile = "3"

[features]
default = ["integration"]
integration = ["bonsai-lint"]
sqlx = ["dep:sqlx"]

[[bin]]
name = "etl-daemon"
path = "src/bin/daemon.rs"
