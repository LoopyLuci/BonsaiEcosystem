[package]
name = "ui-orchestrator"
version = "0.1.0"
edition = "2021"

[lib]
name = "bonsai_ui_orchestrator"
path = "src/lib.rs"

[dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread", "fs"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1"
anyhow = "1"
ui-utils = { path = "../ui-utils" }
uuid = "1"
tracing = "0.1"
cas = { path = "../cas" }
runtime = { path = "../../runtime" }
wasmtime = { version = "8", optional = true, features = ["wat"] }
wasmtime-wasi = { version = "8", optional = true }
rand = "0.8"
tempfile = "3"

[features]
default = ["wasmtime-host"]
wasmtime-host = ["wasmtime", "wasmtime-wasi"]


