[package]
name = "srwsts-schemas"
version = "0.1.0"
edition = "2021"
authors = ["Bonsai Team <team@bonsai.sh>"]
license = "Apache-2.0"
description = "SRWSTS YAML Schema and Validation - Parse and validate stress test plans"
repository = "https://github.com/bonsai/bonsai-bedf"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
thiserror = "1"
validator = { version = "0.16", features = ["derive"] }
anyhow = "1"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"

# SRWSTS core types
srwsts-core = { path = "../srwsts-core" }

[dev-dependencies]
tempfile = "3"
