# SRWSTS Test Plan: Kernel Scheduler Heavy Load
# Tests the kernel task scheduler under heavy concurrent load
version: "1.0"

metadata:
  id: "kernel-scheduler-heavy-load"
  name: "Kernel Scheduler Heavy Load Test"
  description: "Stress the kernel task scheduler with heavy concurrent load, testing preemption, context switching, and fairness"
  plan_version: "1.0"
  tags:
    - kernel
    - scheduler
    - stress
    - concurrency

resource_limits:
  max_cpu_percent: 100
  max_memory_bytes: 4294967296  # 4GB
  max_threads: 2048
  max_file_descriptors: 65536

workloads:
  - id: "cpu-burn-sustained"
    type: "cpu_stress"
    concurrency: 16
    duration_secs: 300
    ops_per_sec: 0
    params:
      cpu_cores: "8"
      burn_type: "math-intensive"

  - id: "io-workload"
    type: "disk_io_stress"
    concurrency: 4
    duration_secs: 300
    ops_per_sec: 10000
    params:
      block_size: "4096"
      io_pattern: "random"

faults:
  - id: "sched-stress"
    type: "task_scheduling_stress"
    inject_at_secs: 60
    duration_secs: 120
    enabled: true
    params:
      context_switch_rate: "10000"

  - id: "cpu-stress-fault"
    type: "cpu_stress"
    inject_at_secs: 200
    duration_secs: 80
    enabled: true
    params:
      cpu_count: 8

max_duration_secs: 360
