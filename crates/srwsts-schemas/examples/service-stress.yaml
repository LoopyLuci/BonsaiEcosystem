# SRWSTS Test Plan: Service Under Stress
# Tests a service's resilience under heavy load and fault conditions
version: "1.0"

metadata:
  id: "service-stress"
  name: "Service Stress Test"
  description: "Tests service resilience under heavy concurrent load with memory pressure and network faults"
  plan_version: "1.0"
  tags:
    - service
    - resilience
    - stress
    - network

resource_limits:
  max_cpu_percent: 80
  max_memory_bytes: 8589934592  # 8GB
  max_disk_bytes: 107374182400  # 100GB
  max_threads: 1024
  max_file_descriptors: 65536
  max_network_mbps: 1000

workloads:
  - id: "api-load"
    type: "http_request_stress"
    concurrency: 128
    duration_secs: 600
    ops_per_sec: 10000
    params:
      endpoint: "/api/health"
      method: "GET"

  - id: "background-worker"
    type: "background_task"
    concurrency: 8
    duration_secs: 600
    ops_per_sec: 100

faults:
  - id: "memory-pressure"
    type: "memory_exhaustion"
    inject_at_secs: 60
    duration_secs: 180
    enabled: true
    params:
      memory_percent: 85

  - id: "network-loss"
    type: "network_packet_loss"
    inject_at_secs: 250
    duration_secs: 120
    enabled: true
    params:
      packet_loss_percent: 15

  - id: "network-latency"
    type: "network_latency"
    inject_at_secs: 400
    duration_secs: 100
    enabled: true
    params:
      latency_ms: 200

max_duration_secs: 700
