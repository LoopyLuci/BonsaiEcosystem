# SRWSTS Test Plan: File Descriptor Exhaustion
# Tests system behavior when file descriptors are exhausted
version: "1.0"

metadata:
  id: "file-descriptor-exhaustion"
  name: "File Descriptor Exhaustion Test"
  description: "Tests system resilience when file descriptors approach system limits"
  plan_version: "1.0"
  tags:
    - resources
    - file-descriptors
    - resilience

resource_limits:
  max_cpu_percent: 50
  max_memory_bytes: 2147483648  # 2GB
  max_file_descriptors: 65536
  max_threads: 512

workloads:
  - id: "file-operations"
    type: "file_io_stress"
    concurrency: 32
    duration_secs: 300
    ops_per_sec: 5000
    params:
      temp_dir: "/tmp/srwsts-test"
      file_size_kb: "1024"

faults:
  - id: "fd-exhaustion"
    type: "file_descriptor_exhaustion"
    inject_at_secs: 60
    duration_secs: 180
    enabled: true
    params:
      target_percent: 90

max_duration_secs: 360
