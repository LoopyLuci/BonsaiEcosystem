[package]
name = "extensions"
version = "0.1.0"
edition = "2021"
description = "Extension system for the Bonsai Ecosystem — manifest, registry, security scanner, installer"

[dependencies]
tokio    = { version = "1", features = ["full"] }
serde    = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
uuid     = { version = "1", features = ["v4", "serde"] }
chrono   = { version = "0.4", features = ["serde"] }
blake3   = "1"
sha2     = "0.10"
hex      = "0.4"
thiserror = "1"
tracing  = "0.1"
reqwest  = { version = "0.12", default-features = false, features = ["json", "stream", "rustls-tls"] }
regex    = "1"
walkdir  = "2"
zip      = { version = "0.6", default-features = false, features = ["deflate"] }
semver   = "1"
dashmap  = "5"
dirs     = "5"
tokio-stream = "0.1"
futures  = "0.3"
