[package]
name = "srwsts-integration"
version = "0.1.0"
edition = "2021"
authors = ["Bonsai Team <team@bonsai.sh>"]
license = "Apache-2.0"
description = "SRWSTS Integration - Bridges to all Bonsai Ecosystem components (Sanctum, EnvironmentFabric, SLM, CAS, UMS, ValidationMesh, Universe, TransferDaemon, HDE)"
repository = "https://github.com/bonsai/bonsai-bedf"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
async-trait = "0.1"
thiserror = "1"
dashmap = "5"
anyhow = "1"
futures = "0.3"
blake3 = "1"

# SRWSTS core and test suites
srwsts-core = { path = "../srwsts-core" }
srwsts-orchestrator = { path = "../srwsts-orchestrator" }
srwsts-schemas = { path = "../srwsts-schemas" }
srwsts-test-suites = { path = "../srwsts-test-suites" }

# Integration points (stubs/traits for components)
# These would be real crates in production

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3"
mockall = "0.11"

[features]
default = ["full-integration"]
full-integration = ["sanctum", "environment-fabric", "slm", "cas", "ums", "validation-mesh", "audit-log", "transfer", "hde"]
sanctum = []
environment-fabric = []
slm = []
cas = []
ums = []
validation-mesh = []
audit-log = []
transfer = []
hde = []
