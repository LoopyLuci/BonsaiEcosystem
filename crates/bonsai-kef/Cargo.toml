[package]
name = "bonsai-kef"
version = "0.1.0"
edition = "2021"
description = "Bonsai Knowledge Extraction Fabric (KEF) — production-grade knowledge extraction from AI models"

[dependencies]
# Core async/runtime
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"
anyhow = "1.0"
thiserror = "1"

# Serialization & data
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# Logging & observability
tracing = "0.1"

# Hashing & crypto
blake3 = "1"
hex = "0.4"

# Text processing
regex = "1"
unicode-normalization = "0.1"

# Math & clustering
ndarray = "0.15"
rand = "0.8"

# Approximate nearest neighbor search
bonsai-hnsw = { path = "../bonsai-hnsw" }

# Data compression
zstd = "0.13"

# Channel-based progress reporting
crossbeam-channel = "0.5"

[dev-dependencies]
tempfile = "3"
tokio-test = "0.4"

[features]
default = []
