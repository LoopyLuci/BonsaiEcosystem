[package]
name = "swarm"
version = "0.1.0"
edition = "2021"
description = "Hierarchical multi-agent swarm orchestration for the Bonsai Ecosystem"

[dependencies]
actors = { path = "../actors" }
mailbox = { path = "../mailbox" }
coordinator = { path = "../coordinator" }

tokio    = { version = "1", features = ["full"] }
serde    = { version = "1", features = ["derive"] }
serde_json = "1"
uuid     = { version = "1", features = ["v4", "serde"] }
chrono   = { version = "0.4", features = ["serde"] }
dashmap  = "5"
blake3   = "1"
thiserror = "1"
tracing  = "0.1"
async-trait = "0.1"
