[package]
name = "omnisystem-sylva"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Sylva: Interactive scripting language for the Bonsai Ecosystem"

[dependencies]
bonsai-language-frontend = { path = "../bonsai-language-frontend" }
bonsai-lair = { path = "../bonsai-lair" }
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
thiserror = "1"
tracing = "0.1"
pest = "2.7"
pest_derive = "2.7"
tokio = { version = "1", features = ["macros", "rt"] }
inventory = "0.3"
once_cell = "1.19"

[dev-dependencies]
tokio-test = "0.4"
