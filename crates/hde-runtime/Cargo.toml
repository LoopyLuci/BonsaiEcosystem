[package]
name = "hde-runtime"
version = "1.0.0"
edition = "2021"
authors = ["Omnisystem Architecture Team"]
license = "Apache-2.0"
description = "Integrated HDE runtime combining all Wave 3 components"

[dependencies]
hde-ai-advisor = { path = "../hde-ai-advisor" }
hde-safety-envelope = { path = "../hde-safety-envelope" }
hde-model-framework = { path = "../hde-model-framework" }
hde-shadow-mode = { path = "../hde-shadow-mode" }
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
thiserror = "1.0"

[profile.release]
opt-level = 3
lto = true
