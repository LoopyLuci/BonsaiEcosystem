[package]
name = "model-converter"
version = "0.1.0"
edition = "2021"
description = "Bonsai Model Converter — converts between GGUF, safetensors, BKP, and HuggingFace models"

[[bin]]
name = "convert"
path = "src/bin/cli.rs"

[dependencies]
error-types = { path = "../error-types" }
package = { path = "../package" }

serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1"
anyhow = "1.0"
tokio = { version = "1.0", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# File handling
sha2 = "0.10"
blake3 = "1"
hex = "0.4"
base64 = "0.21"

# GGUF support
memmap2 = "0.7"
bincode = "1"

# Archive/compression
zip = { version = "0.6", features = ["deflate"] }
zstd = "0.13"

# Subprocess for llama.cpp convert.py
which = "5"
subprocess = "0.2"

# HuggingFace API
reqwest = { version = "0.11", features = ["json", "stream"] }
bytes = "1"

# Progress reporting
indicatif = "0.17"

# CLI
clap = { version = "4.4", features = ["derive", "env"] }
humansize = "2"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }

# Crypto
ed25519-dalek = "2.0"
rand = "0.8"

# Utilities
walkdir = "2"
tempfile = "3"
dirs = "5"
regex = "1"
num_cpus = "1"

[dev-dependencies]
tempfile = "3"
tokio = { version = "1.0", features = ["full"] }
