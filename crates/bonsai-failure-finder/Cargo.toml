[package]
name = "bonsai-failure-finder"
version = "0.1.0"
edition = "2021"
description = "Forced Failure Finder — proactive brute-force error discovery engine"

[dependencies]
tokio        = { version = "1", features = ["full"] }
serde        = { version = "1", features = ["derive"] }
serde_json   = "1"
blake3       = "1"
chrono       = { version = "0.4", features = ["serde"] }
uuid         = { version = "1", features = ["v4", "serde"] }
thiserror    = "1"
tracing      = "0.1"
rand         = "0.8"
regex        = "1"
dashmap      = "5"
rusqlite     = { version = "0.37", features = ["bundled"] }
