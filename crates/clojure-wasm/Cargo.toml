[package]
name = "clojure-wasm"
version = "1.0.0"
edition = "2021"
authors = ["Omnisystem Architecture Team"]
license = "Apache-2.0"
description = "Wave 2, Phase 4: Clojure to WebAssembly compiler"

[dependencies]
wasmtime = "14"
serde = { version = "1.0", features = ["derive"] }
tokio = { version = "1.0", features = ["full"] }
thiserror = "1.0"
log = "0.4"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
