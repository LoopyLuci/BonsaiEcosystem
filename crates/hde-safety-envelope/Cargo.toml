[package]
name = "hde-safety-envelope"
version = "1.0.0"
edition = "2021"
authors = ["Omnisystem Architecture Team"]
license = "Apache-2.0"
description = "Wave 3, Component 2: Safety envelope for HDE runtime guarantees"

[dependencies]
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
thiserror = "1.0"
parking_lot = "0.12"

[profile.release]
opt-level = 3
lto = true
