[package]
name    = "bonsai-coordinator"
version = "0.1.0"
edition = "2021"
description = "BonsAI Multi-Agent Coordinator — work-stealing task distribution across model workers"

[lib]
name = "bonsai_coordinator"
path = "src/lib.rs"

[dependencies]
tokio       = { version = "1", features = ["full"] }
serde       = { version = "1", features = ["derive"] }
serde_json  = "1"
reqwest     = { version = "0.12", features = ["json", "rustls-tls"], default-features = false }
tracing     = "0.1"
uuid        = { version = "1", features = ["v4"] }
futures     = "0.3"
