syntax = "proto3";
package bonsai.api.bridge;

service BridgeService {
  rpc ChatCompletion(BridgeJsonRequest) returns (BridgeJsonResponse);
  rpc ListPeers(BridgeJsonRequest) returns (BridgeJsonResponse);
}

message BridgeJsonRequest {
  string authorization = 1;
  string path = 2;
  string payload_json = 3;
}

message BridgeJsonResponse {
  uint32 status_code = 1;
  string body_json = 2;
}
