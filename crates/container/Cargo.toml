[package]
name = "container"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Bonsai Container Fabric – Next-generation Docker & Kubernetes replacement, integrated with USOS, Sentinel Core, and Echo fabric"

[dependencies]
tokio.workspace = true
serde.workspace = true
chrono.workspace = true
tracing.workspace = true
uuid.workspace = true

# Core crypto & hashing
blake3 = "1.5"
ed25519-dalek = "2.1"
sha2 = "0.10"

# Serialization
serde_json.workspace = true
toml = "0.8"

# Async utilities
parking_lot = "0.12"
dashmap.workspace = true
futures = "0.3"

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# Storage & data structures
dashmap.workspace = true
skiplist = "0.5"

# Networking
quinn = "0.11"        # QUIC
libp2p = "0.53"      # P2P
zeroize = "1.6"      # Secure memory

# Compression
zstd = "0.13"
flate2 = "1.0"

# Utilities
hex = "0.4"
base64 = "0.21"
nom = "7.1"          # Parsing

# Metrics & observability
prometheus = "0.13"

[dev-dependencies]
tokio = { workspace = true, features = ["full"] }
proptest = "1.3"

[features]
default = ["full"]
full = ["simulator", "testing"]
simulator = []
testing = []

[[bin]]
name = "container"
path = "src/bin/main.rs"

[lints]
workspace = true
