[package]
name = "bonsai-cli"
version = "0.1.0"
edition = "2021"
description = "Unified Bonsai Developer Toolkit CLI"

[dependencies]
anyhow = "1.0"
clap = { version = "4.5", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
blake3 = "1"
cargo_metadata = "0.18"
dirs = "5"
rayon = "1.10"
walkdir = "2"
tokio = { version = "1", features = ["full"] }
log = "0.4"
