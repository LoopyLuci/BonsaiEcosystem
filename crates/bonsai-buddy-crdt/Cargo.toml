[package]
name = "bonsai-buddy-crdt"
version = "1.0.0"
edition = "2021"
authors = ["Omnisystem Architecture Team"]
license = "Apache-2.0"
description = "Wave 4, Component 3: CRDT snapshot merging for distributed Bonsai Buddy"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
uuid = { version = "1.0", features = ["v4"] }

[profile.release]
opt-level = 3
lto = true
