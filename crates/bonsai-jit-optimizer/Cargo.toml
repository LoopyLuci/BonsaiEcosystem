[package]
name = "bonsai-jit-optimizer"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "JIT optimization pipeline for Bonsai (Phase 8)"

[dependencies]
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bonsai-lair = { path = "../bonsai-lair" }
bonsai-backend = { path = "../bonsai-backend" }
tokio = { version = "1", features = ["full"] }
rayon = "1"
dashmap = "5"
blake3 = "1"
