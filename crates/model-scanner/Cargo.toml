[package]
name = "model-scanner"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "scan"
path = "src/bin/scan.rs"

[lib]
name = "bonsai_model_scanner"
path = "src/lib.rs"

[dependencies]
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = "0.3"
walkdir = "2"
sha2 = "0.10"
hex = "0.4"
clap = { version = "4", features = ["derive"] }
chrono = { version = "0.4", features = ["serde"] }
