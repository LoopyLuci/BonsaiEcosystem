[package]
name = "srwsts-kernel"
version = "0.1.0"
edition = "2021"
authors = ["Bonsai Team <team@bonsai.sh>"]
license = "Apache-2.0"
description = "SRWSTS Kernel - UOSC kernel independent stress testing system with scheduler, memory, IPC, driver, and invariant tests"
repository = "https://github.com/bonsai/bonsai-bedf"

[dependencies]
tokio = { version = "1", features = ["full", "rt-multi-thread", "sync", "time", "io-util"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
anyhow = "1"
futures = "0.3"
async-trait = "0.1"
dashmap = "5"
parking_lot = "0.12"
rand = "0.8"
histogram = "0.6"
tempfile = "3"
num_cpus = "1.16"

# SRWSTS integration
srwsts-core = { path = "../srwsts-core" }
srwsts-emulation = { path = "../srwsts-emulation" }

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
debug = true
