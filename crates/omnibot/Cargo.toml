[package]
name = "omnibot"
version = "0.1.0"
edition = "2021"

[dependencies]
# Core
anyhow = "1"
thiserror = "1"
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Messaging platforms
teloxide = { version = "0.13", features = ["macros"] }
serenity = { version = "0.11", features = ["client", "gateway", "http"] }
tokio-tungstenite = "0.20"

# HTTP client for MCP
reqwest = { version = "0.11", features = ["json"] }

# Utils
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
tracing-subscriber = "0.3"
lazy_static = "1"
dashmap = "5"
regex = "1"
blake3 = "1"

# Crypto for capability tokens
ed25519-dalek = "2.0"
hex = "0.4"

[dev-dependencies]
tokio-test = "0.4"

[[example]]
name = "telegram_echo"
path = "examples/telegram_echo.rs"

[[example]]
name = "discord_status"
path = "examples/discord_status.rs"

[[example]]
name = "command_dispatch"
path = "examples/command_dispatch.rs"
