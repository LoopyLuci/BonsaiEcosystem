[package]
name = "compiler-cache"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
blake3 = "1"
tokio = { version = "1", features = ["full"] }
dashmap = "5"
lru = "0.12"
hex = "0.4"
bincode = "1"
zstd = "0.13"
buir = { path = "../buir" }
co = { path = "../co" }
cas-ext = { path = "../cas-ext" }
