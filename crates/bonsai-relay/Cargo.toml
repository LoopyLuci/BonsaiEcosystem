[package]
name        = "bonsai-relay"
version     = "0.1.0"
edition     = "2021"
description = "Blind relay client/server for Bonsai peer-to-peer transfer"

[dependencies]
p2p-crypto = { path = "../p2p-crypto" }
p2p-core   = { path = "../p2p-core" }
p2p-identity = { path = "../p2p-identity" }
tokio        = { version = "1", features = ["full"] }
serde        = { version = "1", features = ["derive"] }
serde_json   = "1"
thiserror    = "1"
blake3       = "1"
rand         = "0.8"
uuid         = { version = "1", features = ["v4", "serde"] }
tracing      = "0.1"
async-trait  = "0.1"
dashmap      = "5"
hex          = "0.4"
