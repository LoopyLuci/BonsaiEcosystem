[package]
name = "bonsai-inference"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1"
anyhow = "1.0"
tracing = "0.1"
reqwest = { version = "0.11", features = ["json", "gzip", "brotli", "cookies"] }
ort = { version = "2.0.0-rc.12" }
ndarray = "0.15"
thiserror = "1"
