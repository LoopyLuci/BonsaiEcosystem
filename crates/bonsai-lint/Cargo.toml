[package]
name = "bonsai-lint"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
toml = "0.8"
tokio = { version = "1.0", features = ["full"] }
rayon = "1.7"
tree-sitter = "0.22"
tree-sitter-cpp = "0.21"
tree-sitter-python = "0.21"
tree-sitter-rust = "0.21"
tree-sitter-javascript = "0.21"
tree-sitter-go = "0.21"
tree-sitter-java = "0.21"
tree-sitter-c-sharp = "0.21"
salsa = "0.26"
dashmap = "5.5"
parking_lot = "0.12"
regex = "1.10"
walkdir = "2"
notify = "6"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
lsp-server = "0.7"
lsp-types = "0.96"
hunspell-rs = "0.1"
whatlang = "0.16"
uuid = { version = "1.6", features = ["v4", "serde"] }
async-trait = "0.1"
blake3 = "1"
crossbeam = "0.8"

bonsai-error = { path = "../bonsai-error" }
audit-log = { path = "../audit-log" }
mcp-server = { path = "../mcp-server", optional = true }

[dev-dependencies]
tempfile = "3"
criterion = "0.5"

[features]
default = ["omnisystem"]
omnisystem = []
mcp-integration = ["mcp-server"]

[lib]
name = "bonsai_lint"
path = "src/lib.rs"
