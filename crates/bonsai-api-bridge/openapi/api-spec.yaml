openapi: 3.1.0
info:
  title: Bonsai API Bridge
  version: 1.0.0
  description: Unified multi-protocol gateway for the Bonsai Ecosystem
servers:
  - url: http://127.0.0.1:11429
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        '200':
          description: Healthy
  /openapi.json:
    get:
      summary: OpenAPI document
      responses:
        '200':
          description: OpenAPI JSON
  /api/v1/chat/completions:
    post:
      summary: Chat completions
      security:
        - CapabilityBearer: []
      responses:
        '200':
          description: Response from MCP chat backend
  /api/v1/inference:
    post:
      summary: Inference request
      security:
        - CapabilityBearer: []
      responses:
        '200':
          description: Inference output
  /api/v1/remote/peers:
    get:
      summary: List discoverable peers
      security:
        - CapabilityBearer: []
      responses:
        '200':
          description: Peer list
  /mcp/jsonrpc:
    post:
      summary: MCP JSON-RPC passthrough
      security:
        - CapabilityBearer: []
      responses:
        '200':
          description: MCP JSON-RPC response
  /ws/events:
    get:
      summary: WebSocket stream of API telemetry events
      responses:
        '101':
          description: Switching protocols
components:
  securitySchemes:
    CapabilityBearer:
      type: http
      scheme: bearer
      bearerFormat: JSON Capability Token
