routes:
  - path: /api/v1/chat/completions
    method: POST
    backend: local
    service: mcp-server
    require_capability: ApiCap:inference

  - path: /api/v1/inference
    method: POST
    backend: local
    service: inference
    require_capability: ApiCap:inference

  - path: /api/v1/remote/peers
    method: GET
    backend: local
    service: discovery
    require_capability: ApiCap:discovery

  - path: /mcp/jsonrpc
    method: POST
    backend: local
    service: mcp-server
    require_capability: ApiCap:mcp
