[package]
name = "omni-bot"
version = "0.1.0"
edition = "2021"
authors = ["Omnisystem Team"]
license = "Apache-2.0"
description = "Omni-Bot - Intelligent orchestration agent"

[dependencies]
omni-bot-core = { path = "../omni-bot-core" }
omni-bot-api = { path = "../omni-bot-api" }
omni-bot-actors = { path = "../omni-bot-actors" }
tokio = { version = "1.0", features = ["full"] }
log = "0.4"
env_logger = "0.11"

[[bin]]
name = "omni-bot"
path = "src/main.rs"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
