[package]
name = "remote-desktop"
version = "0.1.0"
edition = "2021"
description = "Bonsai Remote Desktop Fabric (BRDF) — Zero-trust sovereign remote desktop system"
license = "MIT"
authors = ["Bonsai Team"]
repository = "https://github.com/bonsai-ai/bonsai"

[dependencies]
# Async runtime
tokio = { version = "1.38", features = ["full"] }

# Cryptography
ed25519-dalek = "2.1"
sha2 = "0.10"
aes-gcm = "0.10"
rand = "0.8"
zeroize = { version = "1.7", features = ["derive"] }

# Networking
noise-protocol = "0.1"
quinn = "0.11"
quinn-proto = "0.11"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_bytes = "0.11"
bincode = "1.3"

# Logging
tracing = "0.1"
tracing-subscriber = "0.3"

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# Time
chrono = { version = "0.4", features = ["serde"] }

# Bonsai ecosystem
p2p = { path = "../p2p" }
p2p-core = { path = "../p2p-core" }
p2p-crypto = { path = "../p2p-crypto" }
cas = { path = "../cas" }
audit-log = { path = "../audit-log" }
error-types = { path = "../error-types" }
coordinator = { path = "../coordinator" }

# UUID generation
uuid = { version = "1.6", features = ["v4", "serde"] }

# Hex encoding for peer IDs
hex = "0.4"

# Collections & utilities
dashmap = "5.5"
parking_lot = "0.12"
futures = "0.3"
async-trait = "0.1"

# Platform-specific screen capture (stub for now, platform-specific impl per module)
# Real implementations use:
# - Windows: windows-rs with DXGI, Audio
# - macOS: CoreGraphics, AVFoundation
# - Linux: X11/Wayland with PulseAudio
#
# For now: empty trait implementations with compile-time verification

[dev-dependencies]
tokio-test = "0.4"
