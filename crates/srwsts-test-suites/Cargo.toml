[package]
name = "srwsts-test-suites"
version = "0.1.0"
edition = "2021"
authors = ["Bonsai Team <team@bonsai.sh>"]
license = "Apache-2.0"
description = "SRWSTS Modular Test Suites - Comprehensive testing framework for kernel, services, languages, applications, and hardware equivalence"
repository = "https://github.com/bonsai/bonsai-bedf"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
async-trait = "0.1"
thiserror = "1"
dashmap = "5"
anyhow = "1"
futures = "0.3"
parking_lot = "0.12"
rand = "0.8"
metrics = "0.20"

# SRWSTS core
srwsts-core = { path = "../srwsts-core" }
srwsts-orchestrator = { path = "../srwsts-orchestrator" }
srwsts-schemas = { path = "../srwsts-schemas" }

# Test framework
test-orchestrator = { path = "../test-orchestrator" }

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3"
mockall = "0.11"

[features]
default = ["full"]
full = ["kernel-tests", "service-tests", "language-tests", "app-tests", "hardware-equiv", "fullstack"]
kernel-tests = []
service-tests = []
language-tests = []
app-tests = []
hardware-equiv = []
fullstack = []
