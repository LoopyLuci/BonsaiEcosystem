[package]
name = "omni-bot-actors"
version = "0.1.0"
edition = "2021"
authors = ["Omnisystem Team"]
license = "Apache-2.0"
description = "Omni-Bot Aether actor system for distributed agent orchestration"

[dependencies]
omni-bot-core = { path = "../omni-bot-core" }
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
log = "0.4"
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
thiserror = "1.0"
dashmap = "5"
blake3 = "1.0"

[dev-dependencies]
tokio-test = "0.4"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
