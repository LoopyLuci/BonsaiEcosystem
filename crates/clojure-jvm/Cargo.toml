[package]
name = "clojure-jvm"
version = "1.0.0"
edition = "2021"
authors = ["Bonsai Ecosystem Team"]
license = "Apache-2.0"
description = "Clojure JVM runtime with capability-enforced sandbox execution"

[dependencies]
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
log = "0.4"
env_logger = "0.11"
tracing = "0.1"
tracing-subscriber = "0.3"
jni = "0.21"
once_cell = "1.19"

[dev-dependencies]
tempfile = "3.8"
mockall = "0.12"

[[bin]]
name = "clojure-launcher"
path = "src/bin/launcher.rs"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
