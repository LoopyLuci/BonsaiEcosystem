[package]
name = "hde-shadow-mode"
version = "1.0.0"
edition = "2021"
authors = ["Omnisystem Architecture Team"]
license = "Apache-2.0"
description = "Wave 3, Component 4: Shadow mode validation for HDE correctness"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
tokio = { version = "1.0", features = ["full"] }
thiserror = "1.0"

[profile.release]
opt-level = 3
lto = true
