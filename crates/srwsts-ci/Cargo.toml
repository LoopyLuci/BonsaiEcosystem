[package]
name = "srwsts-ci"
version = "0.1.0"
edition = "2021"
description = "Software Regression & Workload Statistics Tracking Service (CI) - production-grade continuous integration regression detection with baseline management and performance tracking"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
blake3 = "1"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
thiserror = "1"
tracing = "0.1"
anyhow = "1"
bytes = "1"
async-trait = "0.1"
parking_lot = "0.12"
futures = "0.3"
dashmap = "5"
statrs = "0.16"
plotly = "0.8"

[dev-dependencies]
tokio-test = "0.4"
