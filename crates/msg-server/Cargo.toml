[package]
name = "msg-server"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "bmf-server"
path = "src/main.rs"

[dependencies]
anyhow = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = "0.3"
msg-core = { path = "../msg-core" }
msg-smtp = { path = "../msg-smtp" }
msg-imap = { path = "../msg-imap" }
