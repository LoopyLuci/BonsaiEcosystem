[package]
name = "bonsai-root-tauri"
version = "0.1.0"
edition = "2021"

[build-dependencies]
tauri-build = { version = "2" }

[dependencies]
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
chrono = { version = "0.4", features = ["clock"] }
hex = "0.4"
reqwest = { version = "0.12", features = ["json", "rustls-tls"] }

bonsai-root = { path = ".." }
