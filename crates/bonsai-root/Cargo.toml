[package]
name = "bonsai-root"
version = "0.1.0"
edition = "2021"
description = "Bonsai Root core installer/updater/launcher safety engine"

[dependencies]
anyhow = "1.0"
chrono = { version = "0.4", features = ["clock"] }
ed25519-dalek = "2.1"
hex = "0.4"
reqwest = { version = "0.12", features = ["rustls-tls", "stream"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = "0.10"
tempfile = "3.10"
tokio = { version = "1", features = ["rt", "macros", "fs"] }
zip = "2.2"
