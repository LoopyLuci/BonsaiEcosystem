[package]
name    = "p2p-core"
version = "2.0.0"
edition = "2021"
description = "Deterministic core of TransferDaemon v2 – connection state machine, scheduler, congestion control"

[dependencies]
p2p-identity = { path = "../p2p-identity" }
p2p-crypto = { path = "../p2p-crypto" }
tokio     = { version = "1", features = ["full"] }
serde     = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror  = "1"
tracing    = "0.1"
blake3     = "1"
uuid       = { version = "1", features = ["v4", "serde"] }
async-trait = "0.1"
bytes      = "1"
dashmap    = "5"
parking_lot = "0.12"
anyhow     = "1"

# Optional AI enhancements (feature-gated)
bonsai-transfer-ai = { path = "../bonsai-transfer-ai", optional = true }

[features]
default = ["deterministic-core"]
deterministic-core = []
ai-enhancements = ["bonsai-transfer-ai"]

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
