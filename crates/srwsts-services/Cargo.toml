[package]
name = "srwsts-services"
version = "0.1.0"
edition = "2021"
authors = ["Bonsai Team <team@bonsai.sh>"]
license = "Apache-2.0"
description = "SRWSTS Services - Stress testing for Omnisystem core services in isolation"
repository = "https://github.com/bonsai/bonsai-bedf"

[dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
anyhow = "1"
futures = "0.3"
dashmap = "5"
async-trait = "0.1"
metrics = "0.20"
parking_lot = "0.12"
rand = "0.8"
hex = "0.4"
sha2 = "0.10"
bytes = "1"
bit-vec = "0.6"

# SRWSTS components
srwsts-core = { path = "../srwsts-core" }
srwsts-orchestrator = { path = "../srwsts-orchestrator" }
srwsts-schemas = { path = "../srwsts-schemas" }

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3"
mockall = "0.11"
proptest = "1"

[features]
default = ["full"]
full = [
    "bootstrap",
    "p2p-stress",
    "storage-stress",
    "network-stress",
    "compositor-stress",
    "service-discovery",
    "service-interaction",
    "fault-scenarios",
    "metrics-collection",
    "result-reporting",
]
bootstrap = []
p2p-stress = []
storage-stress = []
network-stress = []
compositor-stress = []
service-discovery = []
service-interaction = []
fault-scenarios = []
metrics-collection = []
result-reporting = []

[[test]]
name = "integration_tests"
path = "tests/integration_tests.rs"

[[test]]
name = "service_stress_tests"
path = "tests/service_stress_tests.rs"
