[package]
name = "bonsai-kdb"
version = "0.1.0"
edition = "2024"
description = "BonsAI Knowledge Database — modular, hot-swappable knowledge modules for AI inference"

[dependencies]
bonsai-hnsw = { path = "../bonsai-hnsw" }
serde        = { version = "1.0", features = ["derive"] }
serde_json   = "1.0"
thiserror    = "1"
rusqlite     = "0.32"
blake3       = "1"
hex          = "0.4"
tokio        = { version = "1", features = ["full"] }
tracing      = "0.1"
uuid         = { version = "1", features = ["v4", "serde"] }
chrono       = { version = "0.4", features = ["serde"] }
zstd         = "0.13"
