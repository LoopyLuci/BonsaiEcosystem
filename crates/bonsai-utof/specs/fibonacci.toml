# Test Specification: Fibonacci Sequence
# Validates that the Fibonacci function produces identical results across languages

name = "FibonacciSequence"
description = "Tests that Fibonacci computation returns the same result across all languages"
subsystems = ["language", "algorithm-correctness"]
reference_lang = "rust"

canonical_source = """
fn fibonacci(n: usize) -> u64 {
    match n {
        0 => 0,
        1 => 1,
        _ => {
            let mut a = 0u64;
            let mut b = 1u64;
            for _ in 2..=n {
                let c = a + b;
                a = b;
                b = c;
            }
            b
        }
    }
}
"""

languages = ["rust", "python", "javascript"]

# Test cases
[[test_cases]]
name = "fib_0"
input = "0"
expected = "0"
seed = 100

[[test_cases]]
name = "fib_1"
input = "1"
expected = "1"
seed = 101

[[test_cases]]
name = "fib_5"
input = "5"
expected = "5"
seed = 102

[[test_cases]]
name = "fib_10"
input = "10"
expected = "55"
seed = 103

[[test_cases]]
name = "fib_20"
input = "20"
expected = "6765"
seed = 104

fidelity_threshold = 0.99
timeout_secs = 30

[runners]
rust = "cargo run --manifest-path {src} {input}"
python = "python3 {src} {input}"
javascript = "node {src} {input}"
