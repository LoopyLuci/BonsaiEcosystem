[package]
name = "srwsts-fullstack"
version = "0.1.0"
edition = "2021"
authors = ["Bonsai Team <team@bonsai.sh>"]
license = "Apache-2.0"
description = "Full-stack integrated testing system for Omnisystem: UOSC kernel, Omnisystem services, and Bonsai applications"
repository = "https://github.com/bonsai/bonsai-bedf"

[dependencies]
# SRWSTS Foundation
srwsts-core = { path = "../srwsts-core" }
srwsts-test-harness = { path = "../srwsts-test-harness" }
srwsts-orchestrator = { path = "../srwsts-orchestrator" }
srwsts-fault-injection = { path = "../srwsts-fault-injection" }
srwsts-schemas = { path = "../srwsts-schemas" }

# Async runtime
tokio = { version = "1", features = ["full"] }
tokio-util = "0.7"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Error handling
thiserror = "1"
anyhow = "1"

# Concurrency
dashmap = "5"
parking_lot = "0.12"
async-trait = "0.1"

# Utilities
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
futures = "0.3"

# Metrics and monitoring
prometheus = { version = "0.13", optional = true }
metrics = "0.21"

# Distributed components
ahash = "0.8"
smallvec = "1.11"
num_cpus = "1.16"

# Testing utilities
tempfile = "3"
proptest = { version = "1", optional = true }

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3"
proptest = "1"
criterion = "0.5"

[features]
default = []
metrics = ["prometheus"]
fuzz = ["proptest"]
benchmark = []

[[bench]]
name = "fullstack_load"
harness = false

[profile.release]
opt-level = 3
lto = true
codegen-units = 1

[profile.test]
opt-level = 2
