# Unified Bonsai Ecosystem Configuration
# Coordinates all subsystems: CI/CD, Bug Hunt, Survival, KDB, Lint, ETL, MCP, Transfer Daemon, Observability

version: "1.0"
name: "Bonsai Unified Ecosystem"
description: "Complete integration of all Bonsai subsystems"

# Global Settings
global:
  parallel_jobs: 8
  timeout_secs: 3600
  log_level: "info"
  enable_event_bus: true
  enable_observability: true

# System Integration Matrix
systems:
  ci_cd:
    enabled: true
    priority: 1
    depends_on: []
    publishes_events:
      - "ci_cd_start"
      - "ci_cd_complete"
      - "test_failure"
      - "crash_detected"
    subscribes_to:
      - "initialization_complete"

  lint:
    enabled: true
    priority: 1
    depends_on: []
    publishes_events:
      - "lint_complete"
      - "quality_issue"
    subscribes_to:
      - "ci_cd_complete"

  bug_hunt:
    enabled: true
    priority: 2
    depends_on: ["ci_cd"]
    publishes_events:
      - "bug_found"
      - "crash_analyzed"
      - "fix_generated"
    subscribes_to:
      - "test_failure"
      - "crash_detected"

  survival_system:
    enabled: true
    priority: 3
    depends_on: ["bug_hunt"]
    publishes_events:
      - "bug_recorded"
      - "pattern_learned"
    subscribes_to:
      - "bug_found"
      - "fix_generated"

  knowledge_database:
    enabled: true
    priority: 3
    depends_on: ["bug_hunt"]
    publishes_events:
      - "pattern_stored"
      - "pattern_matched"
    subscribes_to:
      - "vulnerability_found"
      - "pattern_discovered"

  etl:
    enabled: true
    priority: 4
    depends_on: ["ci_cd", "bug_hunt", "survival_system"]
    publishes_events:
      - "etl_complete"
      - "parameters_optimized"
    subscribes_to:
      - "test_complete"
      - "bug_recorded"

  mcp_server:
    enabled: true
    priority: 2
    depends_on: []
    publishes_events:
      - "tool_executed"
      - "tool_result"
    subscribes_to:
      - "tool_request"

  transfer_daemon:
    enabled: true
    priority: 4
    depends_on: ["survival_system", "knowledge_database"]
    publishes_events:
      - "sync_complete"
      - "data_transferred"
    subscribes_to:
      - "sync_needed"

  observability:
    enabled: true
    priority: 5
    depends_on: []
    publishes_events:
      - "metrics_collected"
    subscribes_to:
      - "any"

# Workflow Definitions
workflows:
  - name: "Full Ecosystem Pipeline"
    description: "Run all systems in proper sequence"
    stages:
      - stage: 1
        systems: ["lint", "ci_cd"]
        parallel: true
      - stage: 2
        systems: ["bug_hunt", "mcp_server"]
        parallel: true
      - stage: 3
        systems: ["survival_system", "knowledge_database"]
        parallel: true
      - stage: 4
        systems: ["etl", "transfer_daemon"]
        parallel: true
      - stage: 5
        systems: ["observability"]
        parallel: false

  - name: "Quick Validation"
    description: "Fast validation: Lint + CI/CD"
    stages:
      - stage: 1
        systems: ["lint", "ci_cd"]
        parallel: true

  - name: "Bug Hunt Cycle"
    description: "Detect and learn from bugs"
    stages:
      - stage: 1
        systems: ["ci_cd"]
        parallel: false
      - stage: 2
        systems: ["bug_hunt"]
        parallel: false
      - stage: 3
        systems: ["survival_system", "knowledge_database"]
        parallel: true

  - name: "Learning Cycle"
    description: "Extract and store patterns"
    stages:
      - stage: 1
        systems: ["bug_hunt"]
        parallel: false
      - stage: 2
        systems: ["survival_system", "knowledge_database", "etl"]
        parallel: true

# Integration Points
integrations:
  ci_cd_to_bug_hunt:
    trigger: "test_failure"
    action: "analyze_crash"
    retries: 2

  bug_hunt_to_survival:
    trigger: "bug_found"
    action: "record_bug"
    retries: 1

  survival_to_kdb:
    trigger: "pattern_learned"
    action: "store_pattern"
    retries: 1

  bug_hunt_to_fix_gen:
    trigger: "crash_analyzed"
    action: "generate_fix"
    confidence_threshold: 0.8

  kdb_to_ci_cd:
    trigger: "pattern_matched"
    action: "warn_developer"
    retries: 1

# Event Bus Configuration
event_bus:
  enabled: true
  queue_size: 10000
  subscribers_per_event: 5

# Observability
observability:
  metrics:
    - "ci_cd_duration"
    - "bug_detection_rate"
    - "fix_success_rate"
    - "pattern_reuse_count"
    - "system_uptime"

  dashboards:
    - name: "Ecosystem Health"
      refresh_interval_secs: 10
      metrics: ["system_uptime", "event_throughput"]

    - name: "Bug Analytics"
      refresh_interval_secs: 30
      metrics: ["bug_detection_rate", "fix_success_rate"]

# Success Criteria
success_criteria:
  ci_cd:
    all_teams_passed: true
    build_time_seconds: 60

  bug_hunt:
    crashes_analyzed: true
    fixes_generated: true

  learning:
    patterns_learned: true
    confidence_threshold: 0.8

  ecosystem:
    all_systems_healthy: true
    event_delivery_success_rate: 0.99

# Monitoring & Alerting
monitoring:
  enabled: true
  checks:
    - system: "ci_cd"
      metric: "build_time"
      threshold: 300
      action: "warn"

    - system: "bug_hunt"
      metric: "crash_analysis_time"
      threshold: 60
      action: "alert"

    - system: "all"
      metric: "event_throughput"
      threshold: 100
      action: "optimize"

# Backup & Recovery
backup:
  enabled: true
  survival_system:
    interval_hours: 1
    retention_days: 30

  knowledge_database:
    interval_hours: 2
    retention_days: 90

# Version & Compatibility
version_requirements:
  bedf: ">=1.0.0"
  survival_system: ">=1.0.0"
  knowledge_database: ">=1.0.0"
  lint: ">=2.0.0"
  bug_hunt: ">=1.0.0"
  etl: ">=1.0.0"
