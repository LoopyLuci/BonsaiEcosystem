[workspace]
# BACE-optimized workspace structure:
# - Foundation crates (BACE + core infrastructure)
# - Subsystems in their own workspaces (avoid circular dependencies)
# For the Tauri app: cd bonsai-workspace && cargo tauri build
# For BACE-accelerated builds: cargo bace build

resolver = "2"

members = [
    # ========== LAIR (Language-Agnostic IR) ==========
    "crates/bonsai-lair",              # Language-Agnostic Intermediate Representation

    # ========== BACE Foundation (Function-Level Compilation) ==========
    "crates/bonsai-buir",              # Bonsai Unified Intermediate Representation
    "crates/bonsai-bco",               # Bonsai Compiled Objects (serialized functions)
    "crates/bonsai-compile-cache",     # Local compilation cache
    "crates/bonsai-cas-ext",           # CAS extensions for BACE
    "crates/bonsai-hotreload",         # Hot-reload macro and runtime
    "crates/bace-rustc",               # BACE Rust compiler wrapper
    "crates/bace-rt",                  # BACE runtime and proc-macro
    "crates/cargo-bace",               # cargo-bace CLI subcommand

    # ========== Bonsai Polyglot Language System (BPLIS) ==========
    "crates/bonsai-language-frontend", # Language frontend trait & registry
    "crates/bonsai-regex-frontend",    # Regex fallback frontend for languages without LSP
    "bonsai-lang-gen",                 # Meta-generator tool for creating language crates

    # ========== Omnisystem Languages ==========
    "crates/omnisystem-sylva",         # Sylva scripting language
    "crates/omnisystem-titan",         # Titan systems language
    "crates/omnisystem-aether",        # Aether actor language

    # ========== BUEB (Universal Execution Backend) ==========
    "crates/bonsai-backend",           # Hardware abstraction & device allocation

    # ========== USOS Bare-Metal Kernel ==========
    # "crates/usos-kernel",              # USOS Co-OS x86_64 bare-metal kernel (disabled: x86_64 crate has unstable features)

    # ========== Legacy Foundation (keep for compatibility) ==========
    "bonsai-runtime",
    "src-daemon",
    "bonsai-bot",

    # ========== BPCF-Pre (Pre-Compilation Fabric) ==========
    "crates/bonsai-prec",               # Speculative pre-compilation with AI hints

    # ========== TransferDaemon v2 (Sovereign P2P Transport) ==========
    "crates/bonsai-transfer-identity",  # Self-certifying identity (Iroh-inspired)
    "crates/bonsai-transfer-crypto",    # Post-quantum hybrid cryptography
    "crates/bonsai-transfer-core",      # Deterministic core (no AI required)
    "crates/bonsai-transfer-ai",        # Optional AI enhancements (feature-gated)

    # ========== BMF (Bonsai Messaging Fabric) ==========
    "crates/bonsai-bmf-core",           # Core messaging types and encryption
    "crates/bonsai-bmf-smtp",           # SMTP server
    "crates/bonsai-bmf-imap",           # IMAP server
    "crates/bonsai-bmf-p2p",            # P2P delivery via TransferDaemon
    "crates/bonsai-bmf-server", "crates/bonsai-model-workshop", "crates/bonsai-mcp-manager",         # Unified BMF server
]

[workspace.lints.rust]
unsafe_code = "warn"
unused_results = "warn"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Bonsai Team <team@bonsai.sh>"]
license = "Apache-2.0"
repository = "https://github.com/bonsai/bonsai-bedf"

[workspace.dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
blake3 = "1"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
thiserror = "1"
tracing = "0.1"
tracing-subscriber = "0.3"
anyhow = "1"
dashmap = "5"
once_cell = "1"
regex = "1"

# ============================================================================
# Release Profile — Optimized for deployment
# ============================================================================
[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 16              # Balance: compile fast, link fast
panic = "abort"
strip = false                   # Keep symbols for crash triage
split-debuginfo = "packed"

# ============================================================================
# Development Profile — Optimized for instant feedback
# ============================================================================
[profile.dev]
debug = 1
opt-level = 0                   # No optimization, just compile
codegen-units = 256             # Max parallelism: 1 unit per core
incremental = true
split-debuginfo = "packed"

# ============================================================================
# Test Profile — Balance speed and coverage
# ============================================================================
[profile.test]
debug = 1
opt-level = 1
codegen-units = 256
incremental = true
split-debuginfo = "packed"

# ============================================================================
# BACE Profile — Optimized for function-level incremental compilation
# ============================================================================
[profile.bace-dev]
inherits = "dev"
codegen-units = 1            # Required for BACE function extraction
lto = false                  # BACE needs unoptimized code for hot-reload
opt-level = 0
debug = 2                    # Full debug info for BACE to map functions
incremental = true
