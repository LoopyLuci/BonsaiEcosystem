[workspace]
# NOTE: Most crates listed here are in-progress or experimental.
# For building the Bonsai Workspace desktop app, use: cd bonsai-workspace && cargo tauri build
# The crates below are intentionally minimal to avoid loading broken/incomplete members.
members = [
    "bonsai-runtime",
    "src-daemon",
    "bonsai-bot",
]
resolver = "2"

[workspace.lints.rust]
unsafe_code = "warn"
unused_results = "warn"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Bonsai Team <team@bonsai.sh>"]
license = "Apache-2.0"
repository = "https://github.com/bonsai/bonsai-bedf"

[workspace.dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
blake3 = "1"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
thiserror = "1"
tracing = "0.1"
tracing-subscriber = "0.3"
anyhow = "1"
dashmap = "5"
once_cell = "1"
regex = "1"

# ============================================================================
# Release Profile — Optimized for deployment
# ============================================================================
[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 16              # Balance: compile fast, link fast
panic = "abort"
strip = false                   # Keep symbols for crash triage
split-debuginfo = "packed"

# ============================================================================
# Development Profile — Optimized for instant feedback
# ============================================================================
[profile.dev]
debug = 1
opt-level = 0                   # No optimization, just compile
codegen-units = 256             # Max parallelism: 1 unit per core
incremental = true
split-debuginfo = "packed"

# ============================================================================
# Test Profile — Balance speed and coverage
# ============================================================================
[profile.test]
debug = 1
opt-level = 1
codegen-units = 256
incremental = true
split-debuginfo = "packed"
