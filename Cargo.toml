[workspace]
# BACE-optimized workspace structure:
# - Foundation crates (BACE + core infrastructure)
# - Subsystems in their own workspaces (avoid circular dependencies)
# For the Tauri app: cd bonsai-workspace && cargo tauri build
# For BACE-accelerated builds: cargo bace build

resolver = "2"

members = [
    # ========== LAIR (Language-Agnostic IR) ==========
    "crates/core-ir",                  # Language-Agnostic Intermediate Representation

    # ========== BACE Foundation (Function-Level Compilation) ==========
    "crates/compile-cache",            # Local compilation cache
    "crates/cas-ext",                  # CAS extensions for BACE
    "crates/hotreload",                # Hot-reload macro and runtime
    "crates/bace-rustc",               # BACE Rust compiler wrapper
    "crates/bace-rt",                  # BACE runtime and proc-macro
    "crates/cargo-bace",               # cargo-bace CLI subcommand

    # ========== Language System ==========
    "crates/language-system",          # Language frontend trait & registry
    "crates/regex-frontend",           # Regex fallback frontend for languages without LSP
    "lang-gen",                        # Meta-generator tool for creating language crates (root level)

    # ========== Language Runtimes ==========
    "crates/clojure-jvm",              # Clojure JVM runtime with sandbox

    # ========== Wave 2: Clojure Integration ==========
    "crates/titan-core",               # Phase 2: Verified Titan core (persistent data structures)
    "crates/clojurescript-compiler",   # Phase 3: ClojureScript compiler
    "crates/clojure-wasm",             # Phase 4: Clojure WASM
    "crates/aether-clojure",           # Phase 5: Aether distributed agents
    "crates/clojure-formal-verify",    # Phase 6: Clojure formal verification
    "crates/clojure-ecosystem",        # Phase 7: Clojure ecosystem & documentation

    # ========== Wave 3: HDE (Hybrid Determinism Engine) ==========
    "crates/hde-ai-advisor",           # Component 1: AI Advisor Orchestrator
    "crates/hde-safety-envelope",      # Component 2: Safety Envelope
    "crates/hde-model-framework",      # Component 3: Model Framework
    "crates/hde-shadow-mode",          # Component 4: Shadow Mode Validation
    "crates/hde-runtime",              # Integrated HDE runtime combining all components

    # ========== Wave 4: Bonsai Buddy ==========
    "crates/bonsai-buddy-backend",     # Tauri app backend foundation (IPC, API client, state, sync)
    "crates/bonsai-buddy-agent",       # Component 1: Standalone Agent
    "crates/bonsai-buddy-offline-sync", # Component 2: Offline Sync
    "crates/bonsai-buddy-crdt",        # Component 3: CRDT Snapshot Merging

    # ========== Integration & System Testing ==========
    "crates/omnisystem-integration-tests", # Full system integration tests
