[workspace]
members = [
    "crates/bonsai-bedf",
    "crates/bonsai-bedf-fuzzing",
    "crates/bonsai-bedf-concurrency",
    "crates/bonsai-bedf-sanitizers",
    "crates/bonsai-bedf-property",
    "crates/bonsai-bedf-pentest",
    "crates/bonsai-bedf-sandbox",
    "crates/bonsai-bedf-triage",
    "crates/bonsai-bedf-mcp",
    "crates/bonsai-bedf-enhancements",
    "crates/bonsai-survival-system-ext",
    "crates/bonsai-kdb-ext",
    "crates/bonsai-profiler",
    "crates/bonsai-observability",
    "crates/bonsai-coverage",
    "crates/bonsai-resilience",
    "crates/bonsai-bcf",
    "crates/bonsai-security-hardening",
    "crates/bonsai-algorithm-optimization",
    "crates/bonsai-bug-hunter",
    "crates/bonsai-buir",
    "crates/bonsai-bco",
    "crates/bonsai-cas-ext",
    "crates/bonsai-echo-ext",
    "crates/bonsai-hotreload",
    "crates/bonsai-compile-cache",
    "crates/bace-rustc",
    "crates/bace-rt",
    "crates/cargo-bace",
    "crates/bonsai-hdl",
    "crates/bonsai-buse-core",
    "crates/bonsai-emulator",
    "crates/bonsai-buse-mcp",
    "crates/bwe-core",
    "crates/poe-core",
    "crates/poe-mesh",
    "crates/poe-manifestation",
    "crates/poe-bonsai-bridge",
    "crates/poe-boot",
    "crates/poe-bush-sim",
    "crates/bmcs-gateway",
    "crates/bmcs-retriever",
    "crates/bmcs-empathy",
    "crates/bonsai-trmkd",
    "crates/bmcs-server",
    "crates/bmn-common",
    "crates/bmn-sources",
    "crates/bmn-compositor",
    "crates/bmn-encoder",
    "crates/bmn-transport",
    "crates/bmn-ai-enhance",
    "crates/bmn-orchestrator",
    "crates/bmn-dashboard",
    "crates/bmn-cli",
]
resolver = "2"

[workspace.lints.rust]
unsafe_code = "warn"
unused_results = "warn"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Bonsai Team <team@bonsai.sh>"]
license = "Apache-2.0"
repository = "https://github.com/bonsai/bonsai-bedf"

[workspace.dependencies]
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
blake3 = "1"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
thiserror = "1"
tracing = "0.1"
tracing-subscriber = "0.3"
anyhow = "1"
dashmap = "5"
once_cell = "1"
regex = "1"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
strip = true

[profile.dev]
debug = 1
opt-level = 0
codegen-units = 256

[profile.test]
debug = 1
opt-level = 1
codegen-units = 256
